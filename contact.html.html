<!DOCTYPE html>
<html lang="ur" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ کریں – KitabGhar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a1a; --card: #0f0f2a; --text: #e8e8f8; --primary: #7c3aed; --secondary: #06b6d4; --border: #1e1e4a; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
nav { background: #0f0f2a; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
nav a { color: var(--text); text-decoration: none; margin-right: 1.5rem; }
nav a:hover { color: var(--secondary); }
.container { max-width: 700px; margin: 3rem auto; padding: 2rem; background: var(--card); border-radius: 24px; border: 1px solid var(--border); }
h1 { text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.form-group { margin-bottom: 1.5rem; }
label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
input, textarea { width: 100%; padding: 12px; background: #1e1e3a; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 1rem; }
button { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; width: 100%; }
button:hover { transform: scale(1.02); box-shadow: 0 0 12px var(--secondary); }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1e1e3a; padding: 8px 18px; border-radius: 40px; opacity: 0; transition: 0.3s; z-index: 1000; }
footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); margin-top: 2rem; }
</style>
</head>
<body>

<nav>
  <div class="logo">📚 KitabGhar</div>
  <div>
    <a href="index.html">ہوم</a>
    <a href="contact.html">رابطہ</a>
  </div>
</nav>

<div class="container">
  <h1>📬 ہم سے رابطہ کریں</h1>
  <form id="contactForm">
    <div class="form-group">
      <label>آپ کا نام *</label>
      <input type="text" id="contactName" required placeholder="مکمل نام">
    </div>
    <div class="form-group">
      <label>ای میل *</label>
      <input type="email" id="contactEmail" required placeholder="example@domain.com">
    </div>
    <div class="form-group">
      <label>پیغام *</label>
      <textarea id="contactMessage" rows="5" required placeholder="اپنا پیغام یہاں لکھیں..."></textarea>
    </div>
    <button type="submit">📨 پیغام بھیجیں</button>
  </form>
</div>

<footer>
  <p>© 2025 KitabGhar – تمام حقوق محفوظ</p>
</footer>

<div id="toast" class="toast"></div>

<script>
const supabase = window.supabaseClient;

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.background = isError ? '#f44336' : '#1e1e3a';
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 3000);
}

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const message = document.getElementById('contactMessage').value.trim();
  if (!name || !email || !message) {
    showToast('براہ کرم تمام فیلڈز پُر کریں', true);
    return;
  }
  const { error } = await supabase.from('contact_messages').insert([{
    name: name,
    email: email,
    message: message,
    created_at: new Date().toISOString()
  }]);
  if (error) {
    showToast('پیغام بھیجنے میں خرابی: ' + error.message, true);
    return;
  }
  showToast('پیغام کامیابی سے بھیج دیا گیا!');
  document.getElementById('contactForm').reset();
});
</script>
</body>
</html>
