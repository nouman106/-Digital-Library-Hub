<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Library Hub – No Password, Ready to Use</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui;
  background: linear-gradient(135deg, #0A0F2C, #1A1F4D);
  color: white;
  transition: background 0.3s;
  min-height: 100vh;
}
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo {
  font-size: 1.3rem;
  font-weight: bold;
  background: linear-gradient(90deg, #5B2EFF, #00E5FF);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
button, .btn {
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 6px 14px;
  border-radius: 40px;
  color: white;
  cursor: pointer;
}
.admin-btn {
  background: #5B2EFF;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
  padding: 24px;
}
.book-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 18px;
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.1);
}
.book-card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.15);
}
.cover {
  aspect-ratio: 2/3;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
  overflow: hidden;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
}
.book-card h4 {
  margin-top: 8px;
  font-size: 0.9rem;
}
.price {
  color: #FFD966;
  font-weight: bold;
  margin-top: 4px;
}
.detail {
  display: none;
  max-width: 600px;
  margin: 40px auto;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 28px;
  text-align: center;
}
.back {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 6px 16px;
  border-radius: 40px;
  margin-bottom: 20px;
  cursor: pointer;
}
.detail-cover {
  width: 160px;
  height: 220px;
  margin: 0 auto 16px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  overflow: hidden;
}
.detail-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.admin-panel {
  background: rgba(0,0,0,0.85);
  border-radius: 24px;
  padding: 20px;
  margin: 20px;
  display: none;
  max-height: 80vh;
  overflow-y: auto;
}
.admin-panel input, .admin-panel textarea, .admin-panel select {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 8px 12px;
  border-radius: 40px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e1e3a;
  padding: 8px 18px;
  border-radius: 40px;
  opacity: 0;
  transition: 0.3s;
  z-index: 999;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">📘 Digital Library Hub</div>
  <div>
    <button id="adminBtn" class="admin-btn">Admin Panel</button>
  </div>
</div>

<!-- Admin Panel (no password) -->
<div id="adminPanel" class="admin-panel">
  <h3>Add / Edit Book</h3>
  <input type="text" id="title" placeholder="Book Title">
  <input type="text" id="author" placeholder="Author">
  <input type="number" id="price" placeholder="Price (0=Free)" value="0">
  <input type="text" id="imageUrl" placeholder="Image URL (optional)">
  <input type="file" id="coverFile" accept="image/*">
  <input type="text" id="emoji" placeholder="Emoji (fallback)" value="📗">
  <div style="display: flex; gap: 8px;">
    <input type="color" id="color1" value="#1A1F4D">
    <input type="color" id="color2" value="#5B2EFF">
  </div>
  <textarea id="description" rows="2" placeholder="Book description"></textarea>
  <input type="file" id="pdfFile" accept="application/pdf">
  <div style="display: flex; gap: 8px; margin-top: 12px;">
    <button id="saveBook">Save Book</button>
    <button id="cancelEdit">Cancel</button>
  </div>
  <hr>
  <div id="adminBookList"></div>
  <button id="closeAdmin" style="background:rgba(255,255,255,0.2);">Close Admin</button>
</div>

<!-- Store Grid -->
<div id="store" class="grid"></div>

<!-- Book Detail -->
<div id="detail" class="detail">
  <div class="back" id="backBtn">← Back to Store</div>
  <div class="detail-cover" id="detailCover"></div>
  <h2 id="detailTitle"></h2>
  <p id="detailAuthor"></p>
  <p id="detailDesc"></p>
  <div id="detailPrice" style="font-size: 24px; font-weight: bold; margin: 16px 0;"></div>
  <button id="readBtn" class="btn">Read Now</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ---------- INDEXEDDB SETUP ----------
let db = null;
const DB_NAME = 'FinalLib';

function openDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = (e) => {
      const dbRef = e.target.result;
      if (!dbRef.objectStoreNames.contains('books')) {
        const store = dbRef.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
        // Add sample books only if upgrading from empty DB
        const sampleBooks = [
          { title: "Ali Ka Safar (علی کا سفر)", author: "Ahmed Ali", price: 0, imageUrl: "", emoji: "🌙", color1: "#1C2A6E", color2: "#3D5A80", desc: "A children's story about Islamic values.", pdfData: null },
          { title: "Roshni Ki Raah", author: "Maulana Tariq", price: 199, imageUrl: "", emoji: "🕌", color1: "#1A4D2E", color2: "#4A7C59", desc: "Islamic guidance for daily life.", pdfData: null },
          { title: "Kamyab Zindagi", author: "Dr. Umar", price: 349, imageUrl: "", emoji: "🚀", color1: "#3D1A6E", color2: "#6A4C9C", desc: "Motivational and success principles.", pdfData: null }
        ];
        sampleBooks.forEach(b => store.add(b));
      }
    };
    req.onsuccess = () => { db = req.result; resolve(); };
    req.onerror = () => resolve();
  });
}

async function getAllBooks() {
  return new Promise(r => {
    const tx = db.transaction('books', 'readonly');
    tx.objectStore('books').getAll().onsuccess = e => r(e.target.result || []);
  });
}
async function saveBook(book) {
  return new Promise(r => {
    const tx = db.transaction('books', 'readwrite');
    tx.objectStore('books').put(book).onsuccess = () => r();
  });
}
async function deleteBook(id) {
  return new Promise(r => {
    const tx = db.transaction('books', 'readwrite');
    tx.objectStore('books').delete(id).onsuccess = () => r();
  });
}

// ---------- STATE ----------
let books = [];
let purchasedIds = []; // demo purchases stored in memory (for current session)
let editingId = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

// ---------- RENDER STORE ----------
async function renderStore() {
  const grid = document.getElementById('store');
  grid.innerHTML = '';
  if (books.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">📭 No books. Add via Admin Panel.</div>';
    return;
  }
  for (let book of books) {
    const priceText = parseFloat(book.price) === 0 ? 'Free' : 'Rs.' + book.price;
    let coverHtml = '';
    if (book.coverData) coverHtml = `<img src="${book.coverData}">`;
    else if (book.imageUrl) coverHtml = `<img src="${book.imageUrl}" onerror="this.style.display='none'">`;
    else coverHtml = `<span>${book.emoji || '📗'}</span>`;
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="cover" style="background:linear-gradient(135deg, ${book.color1||'#1A1F4D'}, ${book.color2||'#5B2EFF'});">
        ${coverHtml}
      </div>
      <h4>${escapeHtml(book.title)}</h4>
      <div class="price">${priceText}</div>
      <div style="margin-top: 8px;">
        <button class="btn" onclick="event.stopPropagation(); editBook(${book.id})" style="background:#00E5FF20;">✏️</button>
        <button class="btn" onclick="event.stopPropagation(); deleteBookHandler(${book.id})" style="background:#FF6EC720;">🗑️</button>
      </div>
    `;
    card.onclick = () => openBookDetail(book.id);
    grid.appendChild(card);
  }
}

// ---------- BOOK DETAIL ----------
async function openBookDetail(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  const isPurchased = purchasedIds.includes(book.id);
  const isFree = parseFloat(book.price) === 0;
  document.getElementById('store').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.body.style.background = `linear-gradient(135deg, ${book.color1||'#1A1F4D'}, ${book.color2||'#5B2EFF'})`;
  const coverDiv = document.getElementById('detailCover');
  if (book.coverData) coverDiv.innerHTML = `<img src="${book.coverData}">`;
  else if (book.imageUrl) coverDiv.innerHTML = `<img src="${book.imageUrl}" onerror="this.style.display='none'">`;
  else coverDiv.innerHTML = `<span>${book.emoji || '📗'}</span>`;
  coverDiv.style.background = `linear-gradient(135deg, ${book.color1}, ${book.color2})`;
  document.getElementById('detailTitle').innerText = book.title;
  document.getElementById('detailAuthor').innerText = '✍️ ' + (book.author || 'Unknown');
  document.getElementById('detailDesc').innerText = book.desc || '';
  document.getElementById('detailPrice').innerText = isFree ? 'Free' : `Rs. ${book.price}`;
  const readBtn = document.getElementById('readBtn');
  if (isFree || isPurchased) {
    readBtn.innerText = '📖 Read Now';
    readBtn.onclick = () => openPDF(book.id);
  } else {
    readBtn.innerText = '💰 Buy Now (Demo)';
    readBtn.onclick = () => {
      if (confirm(`Demo payment for ${book.title}? No actual charge.`)) {
        purchasedIds.push(book.id);
        showToast('Purchase successful! You can now read.');
        openBookDetail(book.id);
      }
    };
  }
}

// ---------- PDF READER ----------
function openPDF(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book || !book.pdfData) {
    showToast('❌ No PDF uploaded for this book. Please upload a PDF from Admin panel.');
    return;
  }
  try {
    const binary = atob(book.pdfData.split(',')[1]);
    const arr = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
    const blob = new Blob([arr], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const win = window.open();
    if (!win) {
      showToast('⚠️ Popup blocked. Please allow popups for this site.');
      return;
    }
    win.document.write(`
      <html><head><title>${escapeHtml(book.title)}</title></head>
      <body style="margin:0;"><iframe src="${url}" width="100%" height="100%" style="border:none; position:fixed;"></iframe></body>
    </html>`);
  } catch(e) {
    showToast('PDF data error. Please re-upload.');
  }
}

// ---------- BACK TO STORE ----------
function goBack() {
  document.getElementById('store').style.display = 'grid';
  document.getElementById('detail').style.display = 'none';
  document.body.style.background = 'linear-gradient(135deg, #0A0F2C, #1A1F4D)';
}

// ---------- ADMIN PANEL (NO PASSWORD) ----------
let adminOpen = false;
function toggleAdmin() {
  adminOpen = !adminOpen;
  const panel = document.getElementById('adminPanel');
  panel.style.display = adminOpen ? 'block' : 'none';
  if (adminOpen) renderAdminList();
}

async function renderAdminList() {
  const container = document.getElementById('adminBookList');
  container.innerHTML = '';
  for (let book of books) {
    const div = document.createElement('div');
    div.style.cssText = 'background:rgba(255,255,255,0.1); padding:8px; margin:6px 0; border-radius:40px; display:flex; justify-content:space-between; align-items:center;';
    div.innerHTML = `
      <span>📘 ${escapeHtml(book.title)}</span>
      <div>
        <button onclick="editBook(${book.id})" style="background:#00E5FF20; border:none; border-radius:40px; padding:4px 12px; margin:0 4px;">✏️</button>
        <button onclick="deleteBookHandler(${book.id})" style="background:#FF6EC720; border:none; border-radius:40px; padding:4px 12px;">🗑️</button>
      </div>
    `;
    container.appendChild(div);
  }
}

window.editBook = async (id) => {
  const book = books.find(b => b.id === id);
  if (!book) return;
  editingId = id;
  document.getElementById('title').value = book.title;
  document.getElementById('author').value = book.author || '';
  document.getElementById('price').value = book.price;
  document.getElementById('imageUrl').value = book.imageUrl || '';
  document.getElementById('emoji').value = book.emoji || '📗';
  document.getElementById('color1').value = book.color1 || '#1A1F4D';
  document.getElementById('color2').value = book.color2 || '#5B2EFF';
  document.getElementById('description').value = book.desc || '';
  // Clear file inputs (they can't be pre-filled)
  document.getElementById('coverFile').value = '';
  document.getElementById('pdfFile').value = '';
  showToast('Edit mode: modify and click Save.');
};

window.deleteBookHandler = async (id) => {
  if (confirm('Delete this book permanently?')) {
    await deleteBook(id);
    await loadBooks();
    renderStore();
    if (adminOpen) renderAdminList();
    showToast('Book deleted');
  }
};

// ---------- SAVE / UPDATE BOOK ----------
async function saveBookHandler() {
  const title = document.getElementById('title').value.trim();
  if (!title) { showToast('Title is required'); return; }
  let coverData = null;
  const coverFile = document.getElementById('coverFile').files[0];
  if (coverFile) {
    coverData = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(coverFile); });
  }
  let pdfData = null;
  const pdfFile = document.getElementById('pdfFile').files[0];
  if (pdfFile) {
    pdfData = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(pdfFile); });
  }
  const book = {
    title: title,
    author: document.getElementById('author').value.trim(),
    price: document.getElementById('price').value || '0',
    imageUrl: document.getElementById('imageUrl').value.trim(),
    coverData: coverData,
    emoji: document.getElementById('emoji').value.trim() || '📗',
    color1: document.getElementById('color1').value,
    color2: document.getElementById('color2').value,
    desc: document.getElementById('description').value.trim(),
    pdfData: pdfData
  };
  if (editingId) {
    book.id = editingId;
    const old = books.find(b => b.id === editingId);
    if (!coverData && old && old.coverData) book.coverData = old.coverData;
    if (!pdfData && old && old.pdfData) book.pdfData = old.pdfData;
    editingId = null;
  }
  await saveBook(book);
  await loadBooks();
  renderStore();
  if (adminOpen) renderAdminList();
  showToast(book.id ? 'Book updated' : 'Book added');
  // Clear form except maybe keep fields? Reset them
  document.getElementById('title').value = '';
  document.getElementById('author').value = '';
  document.getElementById('price').value = '0';
  document.getElementById('imageUrl').value = '';
  document.getElementById('emoji').value = '📗';
  document.getElementById('color1').value = '#1A1F4D';
  document.getElementById('color2').value = '#5B2EFF';
  document.getElementById('description').value = '';
  document.getElementById('coverFile').value = '';
  document.getElementById('pdfFile').value = '';
}

function cancelEdit() {
  editingId = null;
  document.getElementById('title').value = '';
  document.getElementById('author').value = '';
  document.getElementById('price').value = '0';
  document.getElementById('imageUrl').value = '';
  document.getElementById('emoji').value = '📗';
  document.getElementById('color1').value = '#1A1F4D';
  document.getElementById('color2').value = '#5B2EFF';
  document.getElementById('description').value = '';
  document.getElementById('coverFile').value = '';
  document.getElementById('pdfFile').value = '';
  showToast('Form cleared');
}

async function loadBooks() {
  books = await getAllBooks();
}

// ---------- INIT ----------
window.onload = async () => {
  await openDB();
  await loadBooks();
  renderStore();
  console.log('Books loaded:', books.length);
  document.getElementById('adminBtn').onclick = toggleAdmin;
  document.getElementById('closeAdmin').onclick = () => {
    document.getElementById('adminPanel').style.display = 'none';
    adminOpen = false;
  };
  document.getElementById('saveBook').onclick = saveBookHandler;
  document.getElementById('cancelEdit').onclick = cancelEdit;
  document.getElementById('backBtn').onclick = goBack;
};
</script>
</body>
</html>
