<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KitabGhar — Ilm ki Duniya</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{--bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;--text:#e8e8f8;--text2:#a0a0c8;--text3:#6060a0;--primary:#7c3aed;--primary2:#9f5bff;--secondary:#06b6d4;--border:#1e1e4a;--border2:#1a1a3e;--card:#0f0f2a;--radius:14px;--radius-sm:8px;--font:'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:all .3s}
nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:1rem;height:60px;flex-wrap:wrap}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-search{flex:1;min-width:180px;position:relative}
.nav-search input{width:100%;padding:7px 14px 7px 36px;border:1px solid var(--border);border-radius:20px;background:var(--bg3);color:var(--text);outline:none}
.nav-search .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%)}
.nav-links{display:flex;align-items:center;gap:.8rem;margin-left:auto}
.nav-links a{color:var(--text2);text-decoration:none;padding:5px 8px}
.theme-btn,.admin-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text2);cursor:pointer}
.admin-btn{background:linear-gradient(135deg,#0d0928,#1a1050);color:#fff}
.announcement-bar{background:var(--primary);color:#fff;text-align:center;padding:8px;font-size:.85rem}
.hero-slider{position:relative;height:400px;overflow:hidden}
.slider-container{display:flex;transition:transform .5s ease;height:100%}
.slide{min-width:100%;height:100%;background-size:cover;background-position:center;position:relative}
.slide::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.4)}
.slide-content{position:absolute;bottom:30%;left:10%;color:#fff;z-index:2;max-width:500px}
.slide-content h1{font-size:2.5rem;margin-bottom:.5rem}
.main{max-width:1200px;margin:0 auto;padding:1rem}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer}
.filter-btn.active{background:var(--primary);color:#fff}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.2rem}
.book-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s}
.book-card:hover{transform:translateY(-4px)}
.book-cover-img{width:100%;aspect-ratio:3/4;object-fit:cover}
.book-info{padding:.8rem}
.book-title{font-weight:600;margin-bottom:.2rem}
.book-author{font-size:.75rem;color:var(--text3)}
.price-tag{font-size:.8rem;color:var(--secondary)}
.section{max-width:1200px;margin:2rem auto;padding:0 1rem}
.section-title{font-size:1.5rem;text-align:center;margin-bottom:1rem}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.feature-card{background:var(--bg2);border-radius:var(--radius-sm);padding:1rem;text-align:center}
.feature-card .icon{font-size:2rem}
.contact-form{max-width:600px;margin:1rem auto;display:grid;gap:1rem}
.contact-form input,.contact-form textarea{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.contact-form button{background:var(--primary);border:none;padding:10px;border-radius:30px;color:#fff;cursor:pointer}
footer{background:var(--bg2);text-align:center;padding:1rem;margin-top:2rem;color:var(--text3)}
@media(max-width:600px){.hero-slider{height:250px}.slide-content h1{font-size:1.5rem}}
</style>
</head>
<body>
<div class="announcement-bar" id="announcement-bar">📢 Loading announcement...</div>
<nav>
  <div class="nav-inner">
    <div class="nav-logo">📚 <span id="site-name">KitabGhar</span></div>
    <div class="nav-search"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Kitab dhundhen..."/></div>
    <div class="nav-links"><a href="#features">Features</a><a href="#about">About</a><a href="terms.html">Rules</a><button class="theme-btn" id="theme-toggle">🌙 Dark</button><button class="admin-btn" onclick="location.href='admin.html'">Admin</button></div>
  </div>
</nav>
<div class="hero-slider"><div class="slider-container" id="slider-container">Loading...</div></div>
<div class="main">
  <div class="filters" id="filters"><button class="filter-btn active" data-cat="all">📚 Sab</button><button class="filter-btn" data-cat="islamic">☪️ Islami</button><button class="filter-btn" data-cat="educational">🎓 Talimi</button><button class="filter-btn" data-cat="motivational">🔥 Hosla Afzai</button><button class="filter-btn" data-cat="kids">🧒 Bachon Ki</button><button class="filter-btn" data-cat="other">📖 Aur</button></div>
  <div class="books-grid" id="books-grid"></div>
</div>
<div class="section" id="features"><div class="section-title">✨ Hamare Khaas Features</div><div class="features-grid"><div class="feature-card"><div class="icon">📖</div><div>Asaan Mutalia</div><div>Browser mein seedha parhen</div></div><div class="feature-card"><div class="icon">🆓</div><div>Muft Kitabein</div><div>Kai kitabein muft</div></div><div class="feature-card"><div class="icon">🌙</div><div>Dark Mode</div><div>Aankhon ka sukoon</div></div><div class="feature-card"><div class="icon">📱</div><div>Mobile Friendly</div><div>Har device par</div></div></div></div>
<div class="section" id="about"><div class="section-title">📜 Hamare Baare Mein</div><div class="about-text" id="about-text">Loading...</div></div>
<div class="section" id="contact"><div class="section-title">📩 Rabta Karein</div><form id="contact-form" class="contact-form"><input type="text" id="cname" placeholder="Aapka naam" required><input type="email" id="cemail" placeholder="Email" required><textarea id="cmsg" rows="4" placeholder="Apna paigham likhein..."></textarea><button type="submit">Bhejein</button></form></div>
<footer><span id="footer-text">© 2025 KitabGhar</span></footer>
<script>
  let allBooks = [], currentFilter = 'all', currentSearch = '';
  async function loadSettings() {
    const { data } = await supabase.from('settings').select('*');
    if (data) {
      for (let s of data) {
        if (s.key === 'site_name') document.getElementById('site-name').innerText = s.value;
        else if (s.key === 'announcement') document.getElementById('announcement-bar').innerText = s.value;
        else if (s.key === 'about_text') document.getElementById('about-text').innerText = s.value;
        else if (s.key === 'footer_text') document.getElementById('footer-text').innerText = s.value;
        else if (s.key === 'slider_images') {
          let imgs = JSON.parse(s.value);
          let html = '<div class="slider-container">' + imgs.map(img => `<div class="slide" style="background-image:url(${img})"><div class="slide-content"><h1>KitabGhar</h1><p>Ilm ki Duniya</p></div></div>`).join('') + '</div>';
          document.getElementById('slider-container').innerHTML = html;
          let idx = 0, container = document.querySelector('.slider-container');
          if (container) setInterval(() => { idx = (idx + 1) % imgs.length; container.style.transform = `translateX(-${idx * 100}%)`; }, 4000);
        }
      }
    }
  }
  async function loadBooks() {
    const { data } = await supabase.from('books').select('*').eq('allow_access', true);
    allBooks = data || [];
    renderBooks();
  }
  function renderBooks() {
    let filtered = allBooks;
    if (currentFilter !== 'all') filtered = filtered.filter(b => b.category === currentFilter);
    if (currentSearch) filtered = filtered.filter(b => b.title?.toLowerCase().includes(currentSearch) || b.author?.toLowerCase().includes(currentSearch));
    document.getElementById('books-grid').innerHTML = filtered.map(b => `<div class="book-card" onclick="location.href='book.html?id=${b.id}'"><img class="book-cover-img" src="${b.cover_url || 'https://via.placeholder.com/180x240?text=No+Cover'}" onerror="this.src='https://via.placeholder.com/180x240?text=No+Cover'"><div class="book-info"><div class="book-title">${b.title}</div><div class="book-author">${b.author || ''}</div><div class="price-tag">${b.price == 0 || b.price == '0' ? '🆓 Muft' : 'Rs.' + b.price}</div></div></div>`).join('');
  }
  document.getElementById('filters').addEventListener('click', e => {
    let btn = e.target.closest('.filter-btn');
    if (btn) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.cat; renderBooks(); }
  });
  document.getElementById('search-input').addEventListener('input', e => { currentSearch = e.target.value.toLowerCase(); renderBooks(); });
  document.getElementById('contact-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    let name = document.getElementById('cname').value, email = document.getElementById('cemail').value, msg = document.getElementById('cmsg').value;
    await supabase.from('contact_messages').insert([{ name, email, message: msg }]);
    alert('✅ Paigham bhej diya gaya!'); e.target.reset();
  });
  function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); document.getElementById('theme-toggle').innerText = t === 'dark' ? '☀️ Light' : '🌙 Dark'; localStorage.setItem('theme', t); }
  const savedTheme = localStorage.getItem('theme') || 'light';
  applyTheme(savedTheme);
  document.getElementById('theme-toggle').addEventListener('click', () => { const cur = document.documentElement.getAttribute('data-theme'); applyTheme(cur === 'dark' ? 'light' : 'dark'); });
  trackSiteVisit('home');
  loadSettings();
  loadBooks();
</script>
</body>
</html>
