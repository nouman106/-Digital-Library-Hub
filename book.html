<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kitab — KitabGhar</title>
<style>
:root{
  --bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;
  --text:#e8e8f8;--text2:#a0a0c8;--text3:#6060a0;
  --primary:#7c3aed;--primary2:#9f5bff;--primary-light:#1e1040;
  --secondary:#06b6d4;--secondary-light:#0e2a3a;
  --border:#1e1e4a;--border2:#1a1a3e;
  --card:#0f0f2a;--card-shadow:0 4px 24px rgba(124,58,237,.18);
  --radius:14px;--radius-sm:8px;
  --font:'Segoe UI',Tahoma,sans-serif;
  --glow-p:rgba(124,58,237,.5);--glow-s:rgba(6,182,212,.4);
}
[data-theme="dark"]{
  --bg:#060612;--bg2:#0a0a1e;--bg3:#0d0d24;
  --text:#f0f0ff;--text2:#9090c0;--text3:#5050a0;
  --primary:#8b5cf6;--primary2:#a78bfa;--primary-light:#1a0e40;
  --secondary:#22d3ee;--secondary-light:#0a2535;
  --border:#1a1a40;--border2:#141438;
  --card:#0a0a1e;--card-shadow:0 4px 24px rgba(139,92,246,.2);
  --glow-p:rgba(139,92,246,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* NAV */
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-brand{font-weight:700;color:var(--primary);font-size:1.05rem;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:.6rem}
.back-link{font-size:.85rem;color:var(--text2);padding:5px 12px;border:1px solid var(--border);border-radius:20px;text-decoration:none;transition:all .2s}
.back-link:hover{border-color:var(--primary);background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.82rem;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .2s}
.theme-btn:hover{border-color:var(--primary);background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* HERO BANNER - custom color per book */
.book-hero{
  padding:2.5rem 1rem 0;
  background:var(--book-bg,linear-gradient(135deg,#0a0a1a,#2d2d5e));
  color:var(--book-tc,#eee);
  position:relative;
  overflow:hidden;
}
.book-hero-inner{max-width:860px;margin:0 auto;display:flex;gap:2rem;align-items:flex-end;flex-wrap:wrap;padding-bottom:2rem}
.book-cover-wrap{flex-shrink:0;position:relative}
.book-cover-img{
  width:150px;height:210px;object-fit:cover;
  border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  display:block;
}
.book-cover-placeholder{
  width:150px;height:210px;border-radius:10px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
  box-shadow:0 8px 32px rgba(0,0,0,.35);
}
.book-hero-info{flex:1;min-width:200px}
.book-category-badge{
  display:inline-block;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:3px 12px;
  font-size:.75rem;font-weight:600;letter-spacing:.5px;
  margin-bottom:.8rem;
}
.book-title-main{font-size:1.7rem;font-weight:700;line-height:1.25;margin-bottom:.4rem}
.book-author-main{font-size:1rem;opacity:.75;margin-bottom:1rem}
.price-display{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:1.2rem}
.price-big{font-size:1.4rem;font-weight:700}
.price-free-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 14px;font-size:.85rem;font-weight:600}
.read-now-btn{
  background:#fff;color:#1a1a1a;
  border:none;border-radius:25px;
  padding:12px 32px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  transition:transform .15s,box-shadow .15s;
  display:inline-flex;align-items:center;gap:.5rem;
}
.read-now-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.read-now-btn:active{transform:translateY(0)}

/* WAVE separator */
.wave{display:block;width:100%;height:40px;background:var(--bg);margin-top:-1px}

/* DETAILS SECTION */
.details{max-width:860px;margin:0 auto;padding:1.5rem 1rem 3rem}

.detail-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:1.4rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.detail-card h3{font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.detail-card p{color:var(--text2);font-size:.93rem;line-height:1.8}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.8rem}
.info-item{background:var(--bg3);border-radius:var(--radius-sm);padding:.9rem 1rem}
.info-label{font-size:.73rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem}
.info-value{font-size:.92rem;font-weight:600;color:var(--text)}

/* BOTTOM READ BTN */
.read-bottom{text-align:center;margin:1.5rem 0}
.read-bottom-btn{
  background:var(--primary);color:#fff;
  border:none;border-radius:25px;
  padding:14px 40px;font-size:1.05rem;font-weight:700;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  transition:background .2s,transform .15s;
  display:inline-flex;align-items:center;gap:.6rem;
}
.read-bottom-btn:hover{background:var(--primary2);transform:translateY(-2px)}

/* LOADING */
.page-loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;color:var(--text3)}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-page{text-align:center;padding:4rem 1rem;color:var(--text3)}
.error-page .icon{font-size:3rem;margin-bottom:1rem}

/* ===== ADVANCED ANIMATIONS & GLOW EFFECTS ===== */

/* Hero entrance */
.book-hero{
  animation:heroReveal .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes heroReveal{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

/* Floating orbs on hero */
.book-hero::before,.book-hero::after{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
  animation:heroOrb 7s ease-in-out infinite;
}
.book-hero::before{
  width:350px;height:350px;top:-120px;right:-80px;
  background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
}
.book-hero::after{
  width:200px;height:200px;bottom:-60px;left:-40px;
  background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);
  animation-delay:-3s;animation-duration:5s;
}
@keyframes heroOrb{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-15px,20px) scale(1.1)}
}

/* Book cover 3D lift */
.book-cover-wrap{
  animation:coverReveal .9s cubic-bezier(.16,1,.3,1) .1s both;
}
@keyframes coverReveal{
  from{opacity:0;transform:translateX(-20px) rotate(-3deg)}
  to{opacity:1;transform:translateX(0) rotate(0)}
}
.book-cover-img,.book-cover-placeholder{
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s;
}
.book-cover-wrap:hover .book-cover-img,
.book-cover-wrap:hover .book-cover-placeholder{
  transform:translateY(-8px) rotate(1deg) scale(1.03);
  box-shadow:0 20px 48px rgba(0,0,0,.6);
}

/* Hero info stagger */
.book-category-badge{animation:slideIn .6s .2s both}
.book-title-main{animation:slideIn .6s .3s both}
.book-author-main{animation:slideIn .6s .4s both}
.price-display{animation:slideIn .6s .5s both}
.read-now-btn{animation:slideIn .6s .6s both}
@keyframes slideIn{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}

/* Read now button glow shine */
.read-now-btn{
  position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
}
.read-now-btn::before{
  content:'';position:absolute;top:-50%;left:-60%;width:35%;height:200%;
  background:rgba(124,58,237,.2);transform:skewX(-20deg);
  transition:left .5s ease;
}
.read-now-btn:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 12px 32px rgba(0,0,0,.4);
}
.read-now-btn:hover::before{left:130%}
.read-now-btn:active{transform:scale(.98)}

/* Price badge glow */
.price-free-badge{
  animation:pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge{
  0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}
  50%{box-shadow:0 0 12px 4px rgba(255,255,255,.15)}
}

/* Category badge shimmer */
.book-category-badge{
  position:relative;overflow:hidden;
}
.book-category-badge::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:badgeShimmer 3s infinite;
}
@keyframes badgeShimmer{
  0%{left:-100%}60%,100%{left:150%}
}

/* Detail cards entrance */
.detail-card{
  opacity:0;transform:translateY(20px);
  transition:opacity .5s,transform .5s;
}
.detail-card.visible{opacity:1;transform:translateY(0)}

/* Info items glow on hover */
.info-item{
  transition:transform .2s,box-shadow .2s,border-color .2s;
  border:1px solid transparent;
}
.info-item:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(124,58,237,.12);
  border-color:rgba(124,58,237,.2);
}

/* Bottom read button */
.read-bottom-btn{
  position:relative;overflow:hidden;
  transition:background .2s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  animation:btnGlow 3s ease-in-out infinite;
}
.read-bottom-btn::before{
  content:'';position:absolute;top:-50%;left:-60%;width:35%;height:200%;
  background:rgba(255,255,255,.2);transform:skewX(-20deg);
  transition:left .5s ease;
}
.read-bottom-btn:hover{
  transform:translateY(-4px) scale(1.04);
  box-shadow:0 16px 40px rgba(124,58,237,.45);
}
.read-bottom-btn:hover::before{left:130%}
@keyframes btnGlow{
  0%,100%{box-shadow:0 4px 16px rgba(124,58,237,.15)}
  50%{box-shadow:0 4px 24px rgba(124,58,237,.35),0 0 0 4px rgba(124,58,237,.08)}
}

/* Dark mode glow enhancements */
[data-theme="dark"] .read-bottom-btn{
  animation:btnGlowDark 3s ease-in-out infinite;
}
@keyframes btnGlowDark{
  0%,100%{box-shadow:0 4px 16px rgba(139,92,246,.2)}
  50%{box-shadow:0 4px 32px rgba(139,92,246,.5),0 0 0 4px rgba(139,92,246,.1)}
}
[data-theme="dark"] .book-cover-wrap:hover .book-cover-img{
  box-shadow:0 20px 48px rgba(0,0,0,.8),0 0 32px rgba(139,92,246,.15);
}

/* Nav glow on scroll */
nav{transition:box-shadow .3s}
nav.scrolled{box-shadow:0 4px 24px rgba(124,58,237,.15)}

/* Spinner glow */
.spinner{
  box-shadow:0 0 16px rgba(124,58,237,.3);
}

@media(max-width:500px){
  .book-title-main{font-size:1.3rem}
  .book-cover-img,.book-cover-placeholder{width:110px;height:155px}
  .book-hero-inner{gap:1.2rem}
}

/* ===== NEON PURPLE THEME EXTRAS ===== */
body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,rgba(124,58,237,.06) 0%,transparent 50%)}
nav{background:rgba(15,15,42,.95);backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(124,58,237,.3)}
nav.scrolled{box-shadow:0 0 32px rgba(124,58,237,.2)}
.book-hero{position:relative}
.read-now-btn{box-shadow:0 0 24px rgba(255,255,255,.2)}
.read-now-btn:hover{box-shadow:0 0 40px rgba(255,255,255,.4) !important}
.read-bottom-btn{background:linear-gradient(135deg,#7c3aed,#9f5bff) !important}
.read-bottom-btn:hover{box-shadow:0 0 32px rgba(124,58,237,.7) !important}
.detail-card{background:rgba(15,15,42,.9);border-color:rgba(30,30,74,.8)}
.info-item{background:rgba(19,19,46,.8)}
.info-item:hover{border-color:rgba(124,58,237,.4) !important;box-shadow:0 0 16px rgba(124,58,237,.15) !important}
.spinner{border-color:rgba(124,58,237,.3);border-top-color:#9f5bff;box-shadow:0 0 20px rgba(124,58,237,.4)}

</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">📚 KitabGhar</a>
  <div class="nav-right">
    <a class="back-link" href="index.html">← Wapas</a>
    <button class="theme-btn" id="theme-btn">🌙 Dark</button>
  </div>
</nav>

<div id="page-content">
  <div class="page-loading">
    <div class="spinner"></div>
    <div>Kitab ki malumat load ho rahi hai...</div>
  </div>
</div>

<script>
// ===== THEME =====
const savedTheme=localStorage.getItem('theme')||'light';
document.documentElement.setAttribute('data-theme',savedTheme);
document.getElementById('theme-btn').textContent=savedTheme==='dark'?'☀️ Light':'🌙 Dark';
document.getElementById('theme-btn').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'☀️ Light':'🌙 Dark';
  localStorage.setItem('theme',next);
});

// ===== DB =====
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('kitabghar_db',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=rej;
  });
}
function dbGet(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}

// ===== HELPERS =====
function catLabel(c){
  return{islamic:'☪️ Islami',educational:'🎓 Talimi',motivational:'🔥 Hosla Afzai',kids:'🧒 Bachon Ki',other:'📖 Aur'}[c]||'📚 Kitab';
}
function isFree(b){
  return !b.price||b.price==0||String(b.price).toLowerCase()==='free'||String(b.price).toLowerCase()==='muft';
}

// ===== RENDER =====
function renderBook(book){
  const bg=book.bg_color||'#0a0a1a';
  const tc=book.text_color||'#eeeeee';
  const free=isFree(book);
  const coverHTML=book.cover_url
    ?`<img class="book-cover-img" src="${book.cover_url}" alt="${book.title}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="book-cover-placeholder" style="display:none">📖</div>`
    :`<div class="book-cover-placeholder">📖</div>`;

  const priceHTML=free
    ?`<span class="price-big">🆓 Muft</span><span class="price-free-badge">Bilkul Bedaar</span>`
    :`<span class="price-big">Rs. ${book.price}</span>`;

  const descHTML=book.desc
    ?`<div class="detail-card"><h3>📝 Kitab Ka Taaruf</h3><p>${book.desc}</p></div>`
    :'';

  const wallpaperStyle=book.wallpaper_url
    ?`background-image:url('${book.wallpaper_url}');background-size:cover;background-position:center;`
    :'';

  document.title=(book.title||'Kitab')+' — KitabGhar';

  document.getElementById('page-content').innerHTML=`
    <div class="book-hero" style="--book-bg:${bg};--book-tc:${tc};color:${tc};${wallpaperStyle}">
      <div class="book-hero-inner">
        <div class="book-cover-wrap">${coverHTML}</div>
        <div class="book-hero-info">
          <div class="book-category-badge">${catLabel(book.category)}</div>
          <div class="book-title-main">${book.title||'Naam Nahi'}</div>
          <div class="book-author-main">${book.author?'✍️ '+book.author:''}</div>
          <div class="price-display">${priceHTML}</div>
          <button class="read-now-btn" onclick="openReader(${book.id})">📖 Abhi Parhen</button>
        </div>
      </div>
    </div>
    <svg class="wave" viewBox="0 0 1200 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="fill:var(--bg);background:${bg}"><path d="M0,40 C300,0 900,0 1200,40 L1200,40 L0,40 Z"/></svg>

    <div class="details">
      ${descHTML}
      <div class="detail-card">
        <h3>📋 Kitab Ki Malumat</h3>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Naam</div><div class="info-value">${book.title||'—'}</div></div>
          <div class="info-item"><div class="info-label">Musannif</div><div class="info-value">${book.author||'—'}</div></div>
          <div class="info-item"><div class="info-label">Category</div><div class="info-value">${catLabel(book.category)}</div></div>
          <div class="info-item"><div class="info-label">Qeemat</div><div class="info-value">${free?'Muft 🆓':'Rs. '+book.price}</div></div>
        </div>
      </div>

      <div class="read-bottom">
        <button class="read-bottom-btn" onclick="openReader(${book.id})">📖 Kitab Parhen &rarr;</button>
      </div>
    </div>
  `;
}

function openReader(id){
  window.location.href='reader.html?id='+id;
}

function showError(msg){
  document.getElementById('page-content').innerHTML=`
    <div class="error-page">
      <div class="icon">📭</div>
      <p style="font-size:1rem;margin-bottom:1rem">${msg}</p>
      <a href="index.html" style="color:var(--primary);text-decoration:underline">← Home Wapas Jayein</a>
    </div>`;
}

// ===== APPLY SITE THEME =====
async function applySiteTheme(){
  const themeKeys={bg_color:'--bg',card_color:'--card',text_color:'--text',border_color:'--border',primary_color:'--primary',secondary_color:'--secondary'};
  for(const[k,cssVar]of Object.entries(themeKeys)){
    const r=await dbGet('settings',k).catch(()=>null);
    if(r&&r.value)document.documentElement.style.setProperty(cssVar,r.value);
  }
  // hero gradient for book-hero bg
  const hg=await dbGet('settings','hero_gradient').catch(()=>null);
  if(hg&&hg.value){
    const hero=document.querySelector('.book-hero');
    if(hero)hero.style.setProperty('--book-bg',hg.value);
  }
}

// ===== INIT =====
async function init(){
  const params=new URLSearchParams(window.location.search);
  const id=parseInt(params.get('id'));
  if(!id){showError('Kitab nahi mili');return;}
  try{
    await openDB();
    await applySiteTheme();
    const book=await dbGet('books',id);
    if(!book){showError('Ye kitab mojood nahi hai ya delete ho gayi hai');return;}
    renderBook(book);
    // Animate detail cards after render
    setTimeout(()=>{
      const observer=new IntersectionObserver(entries=>{
        entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});
      },{threshold:.1});
      document.querySelectorAll('.detail-card').forEach((c,i)=>{
        c.style.transitionDelay=(i*0.1)+'s';
        observer.observe(c);
      });
    },100);
  }catch(e){
    showError('Kuch masla aaya: '+e.message);
  }
}

// Nav scroll glow
window.addEventListener('scroll',()=>{
  document.querySelector('nav').classList.toggle('scrolled',window.scrollY>20);
},{passive:true});

init();
</script>
</body>
