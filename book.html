<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kitab — KitabGhar</title>
<script src="site-config.js"></script>
<style>
body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;background:#0a0a1a;color:#eee;min-height:100vh}
.container{max-width:800px;margin:2rem auto;padding:1rem;text-align:center}
.cover{width:180px;border-radius:12px;margin-bottom:1rem;box-shadow:0 8px 32px rgba(124,58,237,0.3)}
h1{font-size:1.8rem;margin-bottom:.5rem}
h3{color:#a0a0c8;margin-bottom:1rem;font-weight:400}
p{color:#a0a0c8;margin-bottom:1rem;line-height:1.7}
.info{background:#0f0f2a;border:1px solid #1e1e4a;border-radius:12px;padding:1rem;margin:1rem 0;display:inline-block;min-width:200px}
button{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;border:none;border-radius:30px;padding:12px 28px;font-size:1rem;cursor:pointer;margin-top:1rem}
button:hover{transform:scale(1.05)}
a{color:#7c3aed}
.back{display:inline-block;margin-top:1.5rem;color:#7c3aed;text-decoration:none}
.error{color:#f44336;padding:2rem}
</style>
</head>
<body data-page="book">
<div id="book-container" class="container">
  <div style="color:#a0a0c8">📖 Load ho raha hai...</div>
</div>
<script>
async function loadBook() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { show('<div class="error">⚠️ Kitab ID nahi mili</div>'); return; }

  try {
    const res = await fetch('books.json?t=' + Date.now());
    const books = await res.json();
    const book = books.find(b => String(b.id) === String(id));
    if (!book) { show('<div class="error">❌ Kitab nahi mili</div>'); return; }

    document.title = book.title + ' — KitabGhar';

    show(`
      ${book.cover_url ? `<img class="cover" src="${book.cover_url}" onerror="this.style.display='none'">` : '<div style="font-size:4rem">📖</div>'}
      <h1>${esc(book.title)}</h1>
      <h3>✍️ ${esc(book.author || 'Unknown')}</h3>
      <p>${esc(book.description || '')}</p>
      <div class="info">
        <div><strong>Category:</strong> ${esc(book.category || '')}</div>
        <div><strong>Price:</strong> ${book.price==0||book.price=='0'?'🆓 Muft':'Rs.'+book.price}</div>
      </div>
      <br>
      ${book.allow_access !== false
        ? `<button onclick="location.href='reader.html?id=${book.id}'">📖 Abhi Parhen</button>`
        : '<div style="color:#f44336;margin-top:1rem">🔒 Yeh kitab abhi dastiyab nahi hai.</div>'
      }
      <br>
      <a class="back" href="index.html">← Home Wapas</a>
    `);
  } catch(e) {
    show('<div class="error">❌ Load nahi hua: ' + e.message + '</div>');
  }
}

function show(html){ document.getElementById('book-container').innerHTML = html; }
function esc(s){ if(!s)return''; return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

loadBook();
</script>
</body>
</html>
