<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel - KitabGhar</title>
<style>
:root{--bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;--text:#e8e8f8;--text2:#a0a0c8;--primary:#7c3aed;--primary2:#9f5bff;--secondary:#06b6d4;--border:#1e1e4a;--radius:14px}
[data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--bg3:#e8e8f5;--text:#1a1a2e;--text2:#444466;--border:#e0e0f0;--card:#ffffff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:all .3s}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border-radius:16px;padding:2.5rem;width:350px;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid var(--border);text-align:center}
.login-title{font-size:1.8rem;font-weight:700;margin-bottom:1.5rem;background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-field input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);margin-bottom:1rem;outline:none}
.login-btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;border-radius:10px;padding:12px;color:#fff;font-weight:600;cursor:pointer;transition:all .3s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(124,58,237,0.4)}
#admin-panel{display:none}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.header h1{background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logout-btn{background:rgba(244,67,54,0.1);color:#f44336;border:1px solid #f44336;padding:8px 18px;border-radius:20px;cursor:pointer;transition:all .3s}
.logout-btn:hover{background:#f44336;color:#fff}
.tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid var(--border);overflow-x:auto;padding-bottom:5px}
.tab-btn{background:none;border:none;color:var(--text2);padding:10px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .3s;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-content{display:none;animation:fadeIn 0.4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem}
.stat-card{background:var(--bg2);padding:1.5rem;border-radius:16px;border:1px solid var(--border);text-align:center;transition:all .3s}
.stat-card:hover{transform:translateY(-5px);border-color:var(--primary)}
.stat-num{font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{color:var(--text2);font-size:.9rem;margin-top:.5rem}
.card{background:var(--bg2);border-radius:16px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.5rem}
.form-group{margin-bottom:1.2rem}
label{display:block;margin-bottom:.5rem;font-weight:600;color:var(--text);font-size:.9rem}
input,textarea,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-family:inherit;outline:none;transition:all .3s}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 10px rgba(124,58,237,0.2)}
.btn-row{display:flex;gap:1rem;margin-top:1rem}
.primary-btn{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;padding:12px 25px;border-radius:10px;cursor:pointer;font-weight:600;transition:all .3s}
.primary-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(124,58,237,0.4)}
.secondary-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:12px 25px;border-radius:10px;cursor:pointer;transition:all .3s}
.books-table-wrapper{overflow-x:auto}
.books-table{width:100%;border-collapse:collapse;margin-top:1rem}
.books-table th{background:var(--bg3);padding:12px;text-align:left;border-bottom:2px solid var(--border);color:var(--text2);font-size:.85rem}
.books-table td{padding:12px;border-bottom:1px solid var(--border);font-size:.9rem}
.books-table tr:hover{background:rgba(124,58,237,0.05)}
.cover-thumb{width:40px;height:55px;object-fit:cover;border-radius:6px;background:var(--bg3)}
.action-btn{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:.8rem;margin-right:5px;transition:all .2s}
.edit-btn{background:rgba(6,182,212,0.1);color:var(--secondary);border:1px solid var(--secondary)}
.edit-btn:hover{background:var(--secondary);color:#fff}
.delete-btn{background:rgba(244,67,54,0.1);color:#f44336;border:1px solid #f44336}
.delete-btn:hover{background:#f44336;color:#fff}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 24px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.3);transform:translateY(100px);transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);z-index:2000}
.toast.show{transform:translateY(0)}
.file-input-wrapper{position:relative;margin-top:5px}
.file-input-wrapper input[type="file"]{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer}
.file-label{display:inline-block;padding:6px 12px;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;font-size:.8rem;color:var(--text2)}
@media(max-width:768px){.container{padding:1rem}.header{flex-direction:column;gap:1rem;text-align:center}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">🔐 Admin Login</div>
    <div class="login-field"><input type="password" id="login-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Login Karein</button>
    <div id="login-err" style="color:#f44336;font-size:.85rem;margin-top:1rem;display:none">❌ Galat password!</div>
  </div>
</div>
<div id="admin-panel">
  <div class="container">
    <div class="header">
      <h1>⚙️ KitabGhar Admin</h1>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
      <button class="tab-btn" onclick="switchTab('manage-books')">📚 Kitabein Manage</button>
      <button class="tab-btn" onclick="switchTab('add-book')">➕ Nai Kitab</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
      <button class="tab-btn" onclick="switchTab('messages')">💬 Messages</button>
    </div>
    <div id="dashboard" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Kul Kitabein</div></div>
        <div class="stat-card"><div class="stat-num" id="s-free">0</div><div class="stat-label">Muft Kitabein</div></div>
        <div class="stat-card"><div class="stat-num" id="s-views">0</div><div class="stat-label">Total Views</div></div>
        <div class="stat-card"><div class="stat-num" id="s-msgs">0</div><div class="stat-label">Messages</div></div>
      </div>
      <div class="card"><h3>Haali Kitabein</h3><div id="recent-list" style="margin-top:1rem"></div></div>
    </div>
    <div id="manage-books" class="tab-content">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h3>Kitabein Manage Karein</h3>
          <button class="primary-btn" style="padding:8px 15px;font-size:.85rem" onclick="switchTab('add-book')">➕ Nai Kitab</button>
        </div>
        <div class="books-table-wrapper">
          <table class="books-table">
            <thead><tr><th>Cover</th><th>Naam</th><th>Musannif</th><th>Category</th><th>Qeemat</th><th>Views</th><th>Actions</th></tr></thead>
            <tbody id="books-tbody"><tr><td colspan="7" style="text-align:center">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="add-book" class="tab-content">
      <div class="card">
        <h3 id="form-title">➕ Nai Kitab Add Karein</h3>
        <form id="book-form" style="margin-top:1.5rem">
          <input type="hidden" id="edit-id">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem">
            <div class="form-group"><label>Kitab ka Naam *</label><input type="text" id="b-title" required></div>
            <div class="form-group"><label>Musannif (Author)</label><input type="text" id="b-author"></div>
            <div class="form-group"><label>Category</label><select id="b-category"><option value="islamic">☪️ Islami</option><option value="educational">🎓 Talimi</option><option value="motivational">🔥 Hosla Afzai</option><option value="kids">🧒 Bachon Ki</option><option value="other">📖 Aur</option></select></div>
            <div class="form-group"><label>Qeemat (0 for Free)</label><input type="number" id="b-price" value="0"></div>
          </div>
          <div class="form-group"><label>Tafseelat (Description)</label><textarea id="b-desc" rows="3"></textarea></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem">
            <div class="form-group"><label>Cover Image URL</label><input type="url" id="b-cover-url"><div class="file-input-wrapper"><span class="file-label">📁 Upload Image</span><input type="file" accept="image/*" onchange="uploadFile(this.files[0], 'b-cover-url', 'covers')"></div></div>
            <div class="form-group"><label>PDF URL *</label><input type="url" id="b-pdf-url" required><div class="file-input-wrapper"><span class="file-label">📁 Upload PDF</span><input type="file" accept=".pdf" onchange="uploadFile(this.files[0], 'b-pdf-url', 'books-pdf')"></div></div>
          </div>
          <div style="display:flex;gap:2rem;margin-top:1rem">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="b-access" checked style="width:auto"> Access Allowed</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="b-download" checked style="width:auto"> Download Allowed</label>
          </div>
          <div class="btn-row"><button type="submit" class="primary-btn">💾 Save Kitab</button><button type="button" class="secondary-btn" onclick="clearForm()">Reset</button></div>
        </form>
      </div>
    </div>
    <div id="settings" class="tab-content">
      <div class="card">
        <h3>Website Settings</h3>
        <form id="settings-form" style="margin-top:1.5rem">
          <div class="form-group"><label>Site Name</label><input type="text" id="s-name"></div>
          <div class="form-group"><label>Announcement Bar</label><input type="text" id="s-ann"></div>
          <div class="form-group"><label>About Text</label><textarea id="s-about" rows="4"></textarea></div>
          <div class="form-group"><label>Footer Text</label><input type="text" id="s-footer"></div>
          <button type="submit" class="primary-btn">✅ Save Settings</button>
        </form>
      </div>
    </div>
    <div id="messages" class="tab-content">
      <div class="card"><h3>User Messages</h3><div id="msgs-list" style="margin-top:1rem"></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">✅ Done!</div>
<script async src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
let supabase=null,allBooks=[],adminPass=localStorage.getItem('admin_pass')||'admin123';function waitForSupabase(){return new Promise(resolve=>{if(window.supabaseClient)resolve(window.supabaseClient);else{const i=setInterval(()=>{if(window.supabaseClient){clearInterval(i);resolve(window.supabaseClient)}},100);setTimeout(()=>clearInterval(i),5000)}})}function showToast(m){const t=document.getElementById('toast');t.innerText=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}function doLogin(){const p=document.getElementById('login-pass').value;if(p===adminPass){document.getElementById('login-screen').style.display='none';document.getElementById('admin-panel').style.display='block';initAdmin()}else{document.getElementById('login-err').style.display='block';setTimeout(()=>document.getElementById('login-err').style.display='none',2000)}}function logout(){document.getElementById('admin-panel').style.display='none';document.getElementById('login-screen').style.display='flex'}function switchTab(t){document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(t).classList.add('active');event.target.classList.add('active');if(t==='manage-books')loadBooks();if(t==='dashboard')loadStats()}async function initAdmin(){supabase=await waitForSupabase();loadStats();loadBooks();loadSettings();loadMessages()}async function loadStats(){const{data:books}=await supabase.from('books').select('id,price,views');const{count:msgCount}=await supabase.from('contact_messages').select('*',{count:'exact',head:true});if(books){document.getElementById('s-total').innerText=books.length;document.getElementById('s-free').innerText=books.filter(b=>b.price==0).length;document.getElementById('s-views').innerText=books.reduce((a,b)=>a+(b.views||0),0);document.getElementById('s-msgs').innerText=msgCount||0;document.getElementById('recent-list').innerHTML=books.slice(0,5).map(b=>`<div style="padding:8px;border-bottom:1px solid var(--border)">📖 ${b.title||'Kitab'}</div>`).join('')}}async function loadBooks(){const{data}=await supabase.from('books').select('*').order('id',{ascending:false});allBooks=data||[];document.getElementById('books-tbody').innerHTML=allBooks.map(b=>`<tr><td><img src="${b.cover_url||''}" class="cover-thumb" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2255%22%3E%3Crect fill=%22%23333%22 width=%2240%22 height=%2255%22/%3E%3C/svg%3E'"></td><td>${b.title}</td><td>${b.author||'-'}</td><td>${b.category}</td><td>${b.price==0?'Free':'Rs.'+b.price}</td><td>${b.views||0}</td><td><button class="action-btn edit-btn" onclick="editBook(${b.id})">✏️</button><button class="action-btn delete-btn" onclick="deleteBook(${b.id})">🗑️</button></td></tr>`).join('')}function editBook(id){const b=allBooks.find(x=>x.id==id);if(!b)return;document.getElementById('edit-id').value=b.id;document.getElementById('b-title').value=b.title;document.getElementById('b-author').value=b.author||'';document.getElementById('b-category').value=b.category;document.getElementById('b-price').value=b.price;document.getElementById('b-desc').value=b.description||'';document.getElementById('b-cover-url').value=b.cover_url||'';document.getElementById('b-pdf-url').value=b.pdf_url||'';document.getElementById('b-access').checked=b.allow_access!==false;document.getElementById('b-download').checked=b.allow_download!==false;document.getElementById('form-title').innerText='✏️ Edit Kitab';switchTab('add-book')}async function deleteBook(id){if(!confirm('Delete?'))return;await supabase.from('books').delete().eq('id',id);showToast('Deleted!');loadBooks();loadStats()}function clearForm(){document.getElementById('book-form').reset();document.getElementById('edit-id').value='';document.getElementById('form-title').innerText='➕ Nai Kitab Add Karein'}async function uploadFile(file,targetId,bucket){if(!file)return;showToast('Uploading...');const name=`${Date.now()}_${file.name}`;const{data,error}=await supabase.storage.from(bucket).upload(name,file);if(error){alert(error.message);return}const{data:{publicUrl}}=supabase.storage.from(bucket).getPublicUrl(name);document.getElementById(targetId).value=publicUrl;showToast('Uploaded!')}document.getElementById('book-form').onsubmit=async e=>{e.preventDefault();const id=document.getElementById('edit-id').value;const book={title:document.getElementById('b-title').value,author:document.getElementById('b-author').value,category:document.getElementById('b-category').value,price:parseInt(document.getElementById('b-price').value),description:document.getElementById('b-desc').value,cover_url:document.getElementById('b-cover-url').value,pdf_url:document.getElementById('b-pdf-url').value,allow_access:document.getElementById('b-access').checked,allow_download:document.getElementById('b-download').checked};const{error}=id?await supabase.from('books').update(book).eq('id',id):await supabase.from('books').insert([book]);if(error)alert(error.message);else{showToast(id?'Updated!':'Added!');clearForm();loadBooks();switchTab('manage-books')}};async function loadSettings(){const{data}=await supabase.from('settings').select('*');if(data)data.forEach(s=>{if(s.key==='site_name')document.getElementById('s-name').value=s.value;if(s.key==='announcement')document.getElementById('s-ann').value=s.value;if(s.key==='about_text')document.getElementById('s-about').value=s.value;if(s.key==='footer_text')document.getElementById('s-footer').value=s.value})}document.getElementById('settings-form').onsubmit=async e=>{e.preventDefault();const s=[{key:'site_name',value:document.getElementById('s-name').value},{key:'announcement',value:document.getElementById('s-ann').value},{key:'about_text',value:document.getElementById('s-about').value},{key:'footer_text',value:document.getElementById('s-footer').value}];for(let x of s)await supabase.from('settings').upsert(x);showToast('Settings Saved!')};async function loadMessages(){const{data}=await supabase.from('contact_messages').select('*').order('id',{ascending:false});if(data)document.getElementById('msgs-list').innerHTML=data.map(m=>`<div class="card" style="margin-bottom:10px"><strong>${m.name}</strong> (${m.email})<p style="margin-top:5px">${m.message}</p></div>`).join('')}
</script>
</body>
</html>
