<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel - KitabGhar</title>
<style>
:root{--bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;--text:#e8e8f8;--text2:#a0a0c8;--primary:#7c3aed;--primary2:#9f5bff;--secondary:#06b6d4;--border:#1e1e4a;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.header h1{background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logout-btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:20px;cursor:pointer}
.tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;color:var(--text2);padding:10px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .3s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}
.form-group{margin-bottom:1.5rem}
label{display:block;margin-bottom:.5rem;font-weight:600;color:var(--text)}
input,textarea,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 10px rgba(124,58,237,0.2)}
button{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;transition:all .3s}
button:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,0.3)}
.success{background:#4caf50;color:#fff;padding:1rem;border-radius:8px;margin-bottom:1rem}
.error{background:#f44336;color:#fff;padding:1rem;border-radius:8px;margin-bottom:1rem}
.books-table{width:100%;border-collapse:collapse}
.books-table th{background:var(--bg2);padding:1rem;text-align:left;border-bottom:1px solid var(--border)}
.books-table td{padding:1rem;border-bottom:1px solid var(--border2)}
.books-table tr:hover{background:var(--bg2)}
.action-btn{padding:5px 10px;margin-right:.5rem;font-size:.9rem}
.delete-btn{background:#f44336}
.edit-btn{background:var(--secondary)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--bg2);padding:2rem;border-radius:12px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.close-btn{background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer}
@media(max-width:768px){.header{flex-direction:column;gap:1rem}.tabs{flex-wrap:wrap}.books-table{font-size:.9rem}.books-table th,.books-table td{padding:.5rem}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 KitabGhar Admin Panel</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('add-book')">Nai Kitab Add Karein</button>
    <button class="tab-btn" onclick="switchTab('manage-books')">Kitabein Manage Karein</button>
    <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
  </div>

  <!-- Add Book Tab -->
  <div id="add-book" class="tab-content active">
    <h2>Nai Kitab Add Karein</h2>
    <div id="add-message"></div>
    <form id="add-book-form">
      <div class="form-group">
        <label>Kitab ka Naam</label>
        <input type="text" id="title" required placeholder="Kitab ka naam likhen">
      </div>
      <div class="form-group">
        <label>Lekhak (Author)</label>
        <input type="text" id="author" placeholder="Lekhak ka naam">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="islamic">☪️ Islami</option>
          <option value="educational">🎓 Talimi</option>
          <option value="motivational">🔥 Hosla Afzai</option>
          <option value="kids">🧒 Bachon Ki</option>
          <option value="other">📖 Aur</option>
        </select>
      </div>
      <div class="form-group">
        <label>Qeemat (Price) - 0 for Free</label>
        <input type="number" id="price" value="0" placeholder="0">
      </div>
      <div class="form-group">
        <label>Tafseelat (Description)</label>
        <textarea id="description" rows="4" placeholder="Kitab ki tafseelat likhen"></textarea>
      </div>
      <div class="form-group">
        <label>Cover Image URL</label>
        <input type="url" id="cover_url" placeholder="https://example.com/cover.jpg">
      </div>
      <div class="form-group">
        <label>PDF URL</label>
        <input type="url" id="pdf_url" required placeholder="https://example.com/book.pdf">
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="allow_access" checked> Access Allowed
        </label>
      </div>
      <button type="submit">Kitab Add Karein</button>
    </form>
  </div>

  <!-- Manage Books Tab -->
  <div id="manage-books" class="tab-content">
    <h2>Kitabein Manage Karein</h2>
    <table class="books-table" id="books-table">
      <thead>
        <tr>
          <th>Kitab</th>
          <th>Lekhak</th>
          <th>Category</th>
          <th>Qeemat</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="books-tbody">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Settings Tab -->
  <div id="settings" class="tab-content">
    <h2>Settings</h2>
    <div id="settings-message"></div>
    <form id="settings-form">
      <div class="form-group">
        <label>Site Name</label>
        <input type="text" id="site_name" placeholder="KitabGhar">
      </div>
      <div class="form-group">
        <label>Announcement</label>
        <input type="text" id="announcement" placeholder="📢 Loading announcement...">
      </div>
      <div class="form-group">
        <label>About Text</label>
        <textarea id="about_text" rows="4" placeholder="About text"></textarea>
      </div>
      <div class="form-group">
        <label>Footer Text</label>
        <input type="text" id="footer_text" placeholder="© 2025 KitabGhar">
      </div>
      <button type="submit">Settings Save Karein</button>
    </form>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Kitab Edit Karein</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <form id="edit-form">
      <div class="form-group">
        <label>Kitab ka Naam</label>
        <input type="text" id="edit-title" required>
      </div>
      <div class="form-group">
        <label>Lekhak</label>
        <input type="text" id="edit-author">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="edit-category" required>
          <option value="islamic">☪️ Islami</option>
          <option value="educational">🎓 Talimi</option>
          <option value="motivational">🔥 Hosla Afzai</option>
          <option value="kids">🧒 Bachon Ki</option>
          <option value="other">📖 Aur</option>
        </select>
      </div>
      <div class="form-group">
        <label>Qeemat</label>
        <input type="number" id="edit-price" value="0">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="edit-description" rows="4"></textarea>
      </div>
      <button type="submit">Update Karein</button>
    </form>
  </div>
</div>

<script async src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
let supabase=null,currentEditId=null;function waitForSupabase(){return new Promise(resolve=>{if(window.supabaseClient)resolve(window.supabaseClient);else{const checkInterval=setInterval(()=>{if(window.supabaseClient){clearInterval(checkInterval);resolve(window.supabaseClient)}},100);setTimeout(()=>clearInterval(checkInterval),5000)}})}function switchTab(tabName){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(tabName).classList.add('active');event.target.classList.add('active');if(tabName==='manage-books')loadBooks()}function showMessage(elementId,message,type){const el=document.getElementById(elementId);el.innerHTML=`<div class="${type}">${message}</div>`;setTimeout(()=>el.innerHTML='',3000)}async function loadBooks(){try{const{data}=await supabase.from('books').select('*').order('id',{ascending:false});const tbody=document.getElementById('books-tbody');tbody.innerHTML=data.map(b=>`<tr><td>${b.title}</td><td>${b.author||'N/A'}</td><td>${b.category}</td><td>${b.price==0?'Free':'Rs.'+b.price}</td><td><button class="action-btn edit-btn" onclick="editBook(${b.id})">Edit</button><button class="action-btn delete-btn" onclick="deleteBook(${b.id})">Delete</button></td></tr>`).join('')}catch(e){console.error(e)}}async function deleteBook(id){if(!confirm('Kya aap is kitab ko delete karna chahte hain?'))return;try{await supabase.from('books').delete().eq('id',id);loadBooks();showMessage('manage-books','Kitab delete ho gayi','')}catch(e){showMessage('manage-books','Error: '+e.message,'error')}}function editBook(id){currentEditId=id;document.getElementById('edit-modal').classList.add('active')}function closeModal(){document.getElementById('edit-modal').classList.remove('active')}document.getElementById('add-book-form').addEventListener('submit',async e=>{e.preventDefault();try{const newBook={title:document.getElementById('title').value,author:document.getElementById('author').value,category:document.getElementById('category').value,price:parseInt(document.getElementById('price').value),description:document.getElementById('description').value,cover_url:document.getElementById('cover_url').value,pdf_url:document.getElementById('pdf_url').value,allow_access:document.getElementById('allow_access').checked};await supabase.from('books').insert([newBook]);showMessage('add-message','✅ Kitab add ho gayi!','success');e.target.reset()}catch(e){showMessage('add-message','Error: '+e.message,'error')}});document.getElementById('edit-form').addEventListener('submit',async e=>{e.preventDefault();try{await supabase.from('books').update({title:document.getElementById('edit-title').value,author:document.getElementById('edit-author').value,category:document.getElementById('edit-category').value,price:parseInt(document.getElementById('edit-price').value),description:document.getElementById('edit-description').value}).eq('id',currentEditId);closeModal();loadBooks();showMessage('manage-books','✅ Kitab update ho gayi!','success')}catch(e){showMessage('manage-books','Error: '+e.message,'error')}});document.getElementById('settings-form').addEventListener('submit',async e=>{e.preventDefault();try{const settings=[{key:'site_name',value:document.getElementById('site_name').value},{key:'announcement',value:document.getElementById('announcement').value},{key:'about_text',value:document.getElementById('about_text').value},{key:'footer_text',value:document.getElementById('footer_text').value}];for(let s of settings){await supabase.from('settings').upsert({key:s.key,value:s.value})}showMessage('settings-message','✅ Settings save ho gayin!','success')}catch(e){showMessage('settings-message','Error: '+e.message,'error')}});function logout(){localStorage.removeItem('admin_token');location.href='index.html'}waitForSupabase().then(client=>{supabase=client;loadBooks()});
</script>
</body>
</html>
