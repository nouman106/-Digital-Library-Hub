<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
body{display:flex;flex-direction:column;height:100vh;margin:0;font-family:'Segoe UI',sans-serif}
header{background:#1e1e2f;color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
button{background:#7c3aed;border:none;color:#fff;padding:6px 12px;border-radius:20px;cursor:pointer}
.pdf-container{flex:1;overflow:auto;padding:1rem;background:#525659}
.pdf-page{margin:0 auto 1rem;box-shadow:0 0 10px rgba(0,0,0,0.3);background:#fff}
canvas{width:100%;height:auto;display:block}
.watermark{position:fixed;bottom:10px;right:10px;background:#000;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;z-index:999}
</style>
</head>
<body>
<header><button onclick="location.href='index.html'">← Wapas</button><span id="book-title"></span><div><button onclick="zoomIn()">🔍+</button><button onclick="zoomOut()">🔍−</button></div></header>
<div class="pdf-container" id="pdf-container"></div>
<script>
let pdfDoc=null, scale=1.2;
async function init(){
  let id=new URLSearchParams(location.search).get('id');
  if(!id) return;
  let {data:book}=await supabase.from('books').select('*').eq('id',id).single();
  if(!book) return;
  document.getElementById('book-title').innerText=book.title||'Kitab';
  if(!book.allow_access) { document.querySelector('.pdf-container').innerHTML='<div style="text-align:center">Yeh kitab dastiyab nahi hai</div>'; return; }
  if(!book.allow_download) {
    let wm=document.createElement('div');
    wm.className='watermark';
    wm.innerText='📖 Sirf parhne ke liye – Download allowed nahi';
    document.body.appendChild(wm);
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{ if(e.ctrlKey && (e.key==='s'||e.key==='S'||e.key==='p'||e.key==='P')) e.preventDefault(); });
  }
  await incrementBookDownloads(parseInt(id));
  let pdfSrc=book.pdf_url;
  if(!pdfSrc) { document.querySelector('.pdf-container').innerHTML='<div>PDF link nahi hai</div>'; return; }
  if(pdfSrc.startsWith('data:application/pdf')){
    let base64=pdfSrc.split(',')[1];
    let binary=atob(base64); let bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    let blob=new Blob([bytes],{type:'application/pdf'});
    pdfSrc=URL.createObjectURL(blob);
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  let loadingTask=pdfjsLib.getDocument(pdfSrc);
  pdfDoc=await loadingTask.promise;
  renderAllPages();
}
async function renderAllPages(){
  let container=document.getElementById('pdf-container');
  container.innerHTML='';
  for(let i=1;i<=pdfDoc.numPages;i++){
    let page=await pdfDoc.getPage(i);
    let viewport=page.getViewport({scale});
    let canvas=document.createElement('canvas');
    canvas.height=viewport.height;
    canvas.width=viewport.width;
    canvas.style.width='100%';
    canvas.style.height='auto';
    let ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport}).promise;
    let div=document.createElement('div');
    div.className='pdf-page';
    div.appendChild(canvas);
    container.appendChild(div);
  }
}
function zoomIn(){ scale=Math.min(scale+0.2,3); if(pdfDoc) renderAllPages(); }
function zoomOut(){ scale=Math.max(scale-0.2,0.6); if(pdfDoc) renderAllPages(); }
init();
</script>
</body>
</html>
