<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kitab Parh Rahe Hain — KitabGhar</title>
<style>
:root{
  --bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;
  --text:#e8e8f8;--text2:#a0a0c8;--text3:#6060a0;
  --primary:#7c3aed;--primary2:#9f5bff;--primary-light:#1e1040;
  --secondary:#06b6d4;--border:#1e1e4a;--border2:#1a1a3e;
  --card:#0f0f2a;--radius:14px;--radius-sm:8px;
  --font:'Segoe UI',Tahoma,sans-serif;
  --glow-p:rgba(124,58,237,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,sans-serif}
body{display:flex;flex-direction:column;background:#0a0a1a;color:#eee;transition:background .3s}

/* HEADER */
.reader-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1rem;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(6px);
  flex-shrink:0;
  gap:.5rem;
  flex-wrap:wrap;
  z-index:10;
}
.header-left{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
.back-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:inherit;border-radius:20px;padding:5px 14px;font-size:.82rem;cursor:pointer;
  white-space:nowrap;transition:background .2s;font-family:inherit;
}
.back-btn:hover{background:rgba(255,255,255,.28)}
.book-title-bar{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9}
.header-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.hdr-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:inherit;border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;
  transition:background .2s;font-family:inherit;white-space:nowrap;
}
.hdr-btn:hover{background:rgba(255,255,255,.25)}

/* MAIN AREA */
.reader-body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}

/* PDF IFRAME */
.pdf-frame{width:100%;height:100%;border:none;display:block}

/* LOADING */
.loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:inherit;z-index:5;
}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.8);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;opacity:.7}

/* ERROR */
.error-box{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;padding:2rem;text-align:center;
}
.error-icon{font-size:3rem}
.error-msg{font-size:1rem;opacity:.85;max-width:400px;line-height:1.6}
.error-hint{font-size:.82rem;opacity:.6;max-width:380px;line-height:1.5}

/* WALLPAPER overlay */
.wallpaper{position:fixed;inset:0;background-size:cover;background-position:center;z-index:-1;opacity:.18}

/* ===== ADVANCED ANIMATIONS & GLOW EFFECTS ===== */
.reader-header{
  animation:headerSlide .5s cubic-bezier(.16,1,.3,1) both;
  border-bottom:1px solid rgba(255,255,255,.1);
}
@keyframes headerSlide{
  from{opacity:0;transform:translateY(-100%)}
  to{opacity:1;transform:translateY(0)}
}
.back-btn{
  position:relative;overflow:hidden;
  transition:background .2s,box-shadow .2s,transform .15s;
}
.back-btn::after{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:rgba(255,255,255,.2);transform:skewX(-20deg);
  transition:left .4s;
}
.back-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.back-btn:hover::after{left:130%}
.hdr-btn{
  position:relative;overflow:hidden;
  transition:background .2s,box-shadow .2s,transform .15s;
}
.hdr-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.book-title-bar{
  animation:titleFade .6s .3s both;
}
@keyframes titleFade{
  from{opacity:0;transform:translateX(10px)}
  to{opacity:.9;transform:translateX(0)}
}
.spinner{
  box-shadow:0 0 20px rgba(255,255,255,.25);
  animation:spin .8s linear infinite, spinGlow 2s ease-in-out infinite;
}
@keyframes spinGlow{
  0%,100%{box-shadow:0 0 12px rgba(255,255,255,.15)}
  50%{box-shadow:0 0 28px rgba(255,255,255,.35)}
}
.loading-text{
  animation:textPulse 2s ease-in-out infinite;
}
@keyframes textPulse{
  0%,100%{opacity:.5}
  50%{opacity:.9}
}
.pdf-frame{
  animation:frameReveal .6s both;
}
@keyframes frameReveal{
  from{opacity:0;transform:scale(.99)}
  to{opacity:1;transform:scale(1)}
}
.error-icon{
  animation:floatIcon 3s ease-in-out infinite;
  display:block;
}
@keyframes floatIcon{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}
#zoom-in:hover,#zoom-out:hover{
  background:rgba(255,255,255,.3);
  box-shadow:0 0 12px rgba(255,255,255,.2);
}
.wallpaper{
  animation:wallpaperZoom 20s ease-in-out infinite alternate;
}
@keyframes wallpaperZoom{
  from{transform:scale(1)}
  to{transform:scale(1.05)}
}
.loading.hide{
  animation:loadingFade .4s ease both;
}
@keyframes loadingFade{
  from{opacity:1}
  to{opacity:0;pointer-events:none}
}
@media(max-width:500px){
  .book-title-bar{font-size:.82rem}
  .hdr-btn span{display:none}
}
body{background:#0a0a1a}
.reader-header{background:rgba(10,10,26,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(124,58,237,.25);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.back-btn{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4)}
.back-btn:hover{background:rgba(124,58,237,.35) !important;box-shadow:0 0 16px rgba(124,58,237,.4) !important}
.hdr-btn{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.35)}
.hdr-btn:hover{background:rgba(124,58,237,.3) !important;box-shadow:0 0 12px rgba(124,58,237,.3) !important}
.spinner{border-color:rgba(124,58,237,.25);border-top-color:#9f5bff;box-shadow:0 0 24px rgba(124,58,237,.5)}
</style>
</head>
<body>

<div class="wallpaper" id="wallpaper"></div>

<div class="reader-header" id="reader-header">
  <div class="header-left">
    <button class="back-btn" onclick="goBack()">← Wapas</button>
    <div class="book-title-bar" id="book-title">Kitab Load Ho Rahi Hai...</div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" id="zoom-in" onclick="zoomIn()">🔍+ <span>Bara</span></button>
    <button class="hdr-btn" id="zoom-out" onclick="zoomOut()">🔍− <span>Chota</span></button>
    <button class="hdr-btn" onclick="toggleFullscreen()">⛶ <span>Full</span></button>
  </div>
</div>

<div class="reader-body" id="reader-body">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Kitab khul rahi hai, thora intezaar karein...</div>
  </div>
  <div class="error-box" id="error-box">
    <div class="error-icon">📭</div>
    <div class="error-msg" id="error-msg">PDF load nahi ho saka</div>
    <div class="error-hint" id="error-hint"></div>
    <button class="back-btn" style="margin-top:.5rem" onclick="goBack()">← Home Wapas Jayein</button>
  </div>
  <iframe class="pdf-frame" id="pdf-frame" style="display:none" title="Book Reader"></iframe>
</div>

<script>
// ========== SECURITY: Block Right-click, Save Shortcuts, DevTools ==========
(function() {
  // Block right-click
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  });

  // Block keyboard shortcuts: Ctrl+S, Ctrl+P, Ctrl+U, Ctrl+Shift+I, F12
  document.addEventListener('keydown', function(e) {
    // Ctrl+S, Ctrl+P, Ctrl+U
    if (e.ctrlKey && (e.key === 's' || e.key === 'S' ||
                      e.key === 'p' || e.key === 'P' ||
                      e.key === 'u' || e.key === 'U')) {
      e.preventDefault();
      return false;
    }
    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
      e.preventDefault();
      return false;
    }
    // F12
    if (e.key === 'F12') {
      e.preventDefault();
      return false;
    }
  });
})();

// ========== DB (Same as before, keeps your existing library) ==========
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('kitabghar_db',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=rej;
  });
}
function dbGet(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}

// ========== LOAD BOOK with Google Docs viewer (no download button) ==========
async function init(){
  const params=new URLSearchParams(window.location.search);
  const bookId=parseInt(params.get('id'));
  if(!bookId){showError('Kitab ID nahi mili','index.html par wapas jayein aur dobara try karein');return;}
  try{
    await openDB();
    const book=await dbGet('books',bookId);
    if(!book){showError('Kitab nahi mili','Shayad kitab delete ho gayi ho');return;}
    loadBook(book);
  }catch(e){
    showError('Database Error: '+e.message,'Browser refresh kar ke dobara try karein');
  }
}

function loadBook(book){
  // Apply theme
  const bg=book.bg_color||'#0a0a1a';
  const tc=book.text_color||'#eeeeee';
  const wallpaper=book.wallpaper_url||'';
  document.body.style.background=bg;
  document.body.style.color=tc;
  document.getElementById('reader-header').style.color=tc;

  if(wallpaper){
    document.getElementById('wallpaper').style.backgroundImage=`url('${wallpaper}')`;
  }

  document.title=(book.title||'Kitab')+' — KitabGhar';
  document.getElementById('book-title').textContent=book.title||'Kitab';

  const pdfUrl=book.pdf_url||'';
  if(!pdfUrl){
    showError('PDF link maujood nahi hai','Admin se is kitab ka PDF link add karwayein');
    return;
  }

  const frame=document.getElementById('pdf-frame');
  
  // FORCE Google Docs embedded viewer to hide download/print buttons
  // It also prevents right-click on PDF (though not 100% perfect, but best free method)
  const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
  frame.src = viewerUrl;

  frame.onload = () => {
    document.getElementById('loading').style.display = 'none';
    frame.style.display = 'block';
  };
  frame.onerror = () => {
    // Fallback to direct PDF if Google fails (but will show download button)
    frame.src = pdfUrl;
    frame.onload = () => {
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    };
    frame.onerror = () => {
      showError('PDF load nahi ho saka','URL check karein — Direct PDF link hona chahiye (Google Drive ya Dropbox direct link)');
    };
  };

  setTimeout(() => {
    if(frame.style.display === 'none'){
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    }
  }, 15000);
}

function showError(msg,hint){
  document.getElementById('loading').style.display='none';
  document.getElementById('pdf-frame').style.display='none';
  const box=document.getElementById('error-box');
  box.style.display='flex';
  document.getElementById('error-msg').textContent=msg;
  document.getElementById('error-hint').textContent=hint||'';
}

// ========== CONTROLS ==========
function goBack(){
  if(document.referrer&&document.referrer.includes('index')){history.back();}
  else{window.location.href='index.html';}
}

let zoom=100;
function zoomIn(){zoom=Math.min(zoom+10,200);document.getElementById('pdf-frame').style.transform=`scale(${zoom/100})`;document.getElementById('pdf-frame').style.transformOrigin='top center';}
function zoomOut(){zoom=Math.max(zoom-10,50);document.getElementById('pdf-frame').style.transform=`scale(${zoom/100})`;document.getElementById('pdf-frame').style.transformOrigin='top center';}

function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
  else{document.exitFullscreen();}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&!document.fullscreenElement)goBack();
});

init();
</script>
</body>
</html>
