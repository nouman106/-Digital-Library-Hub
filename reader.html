<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;background:#525659;color:#eee}
header{background:#1e1e2f;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;flex-shrink:0}
#book-title{font-weight:600;font-size:1rem;flex:1;text-align:center;color:#fff}
.btn{background:#7c3aed;border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.9rem;text-decoration:none;display:inline-block}
#pdf-container{flex:1;overflow:auto;padding:1rem}
.pdf-page{margin:0 auto 1rem;box-shadow:0 0 10px rgba(0,0,0,0.5);max-width:900px;background:#fff;position:relative}
canvas{width:100%;height:auto;display:block}
.page-placeholder{background:#2a2a3f;display:flex;align-items:center;justify-content:center;color:#888;font-size:.9rem;min-height:200px}
.msg{text-align:center;padding:3rem;color:#eee;font-size:1.1rem;line-height:2}
#progress-bar-wrap{background:#333;height:4px;width:100%;position:sticky;top:0;z-index:10}
#progress-bar{height:4px;background:#7c3aed;width:0%;transition:width 0.3s}
#page-counter{text-align:center;color:#aaa;font-size:.8rem;padding:4px;background:#1e1e2f;position:sticky;top:4px;z-index:9}

/* Entry overlay */
#fs-overlay{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1e1e2f,#2d1b69);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  color:#fff;cursor:pointer;user-select:none;
}
#fs-overlay .start-btn{
  background:#7c3aed;padding:14px 44px;border-radius:30px;
  font-size:1.15rem;font-weight:700;
  box-shadow:0 0 28px #7c3aed99;
  transition:transform .1s;
}
#fs-overlay:active .start-btn{transform:scale(0.96)}
</style>
</head>
<body>

<!-- Entry Screen -->
<div id="fs-overlay">
  <div style="font-size:4rem">📖</div>
  <div style="font-size:1.7rem;font-weight:700;color:#c4b5fd">KitabGhar Reader</div>
  <div style="font-size:1rem;color:#a78bfa;text-align:center;line-height:1.9">
    Kitab padhne ke liye<br>screen par tap karein
  </div>
  <div class="start-btn">▶ Shuru Karein</div>
  <div style="font-size:0.72rem;color:#6b7280;margin-top:0.3rem">Full screen mein khulega</div>
</div>

<header>
  <button class="btn" onclick="location.href='index.html'">← Wapas</button>
  <span id="book-title">KitabGhar Reader</span>
  <div style="display:flex;gap:6px">
    <button class="btn" onclick="zoomIn()">🔍+</button>
    <button class="btn" onclick="zoomOut()">🔍−</button>
  </div>
</header>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="page-counter"></div>

<div id="pdf-container">
  <div class="msg" id="msg">📖 Kitab load ho rahi hai...</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
let pdfDoc = null, scale = 1.2, currentUrl = '', renderedPages = 0;

// ===== FULLSCREEN FUNCTIONS =====
function enterFullscreen(){
  let el = document.documentElement;
  let p = el.requestFullscreen ? el.requestFullscreen()
        : el.webkitRequestFullscreen ? el.webkitRequestFullscreen()
        : el.mozRequestFullScreen ? el.mozRequestFullScreen()
        : el.msRequestFullscreen ? el.msRequestFullscreen()
        : null;
  return (p && p.catch) ? p.catch(()=>{}) : Promise.resolve();
}

function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement ||
            document.mozFullScreenElement || document.msFullscreenElement);
}

// Fullscreen se nikle to wapas andar
function onFsChange(){
  if(!isFullscreen()) setTimeout(()=>enterFullscreen(), 100);
}
document.addEventListener('fullscreenchange', onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);
document.addEventListener('mozfullscreenchange', onFsChange);
document.addEventListener('msfullscreenchange', onFsChange);

// Keys block karo
document.addEventListener('keydown', function(e){
  if(['F11','Escape','F5'].includes(e.key)){
    e.preventDefault(); e.stopPropagation();
  }
  if((e.ctrlKey||e.metaKey) && ['w','W','r','R','t','T'].includes(e.key)){
    e.preventDefault(); e.stopPropagation();
  }
}, true);

// Right click band
document.addEventListener('contextmenu', e => e.preventDefault());

// ===== ENTRY SCREEN =====
const overlay = document.getElementById('fs-overlay');

async function startReading(){
  await enterFullscreen();
  overlay.style.display = 'none';
  init();
}
overlay.addEventListener('click', startReading);
overlay.addEventListener('touchstart', function(e){
  e.preventDefault();
  startReading();
}, {passive:false});

// ===== PDF FUNCTIONS =====
async function init(){
  let id = new URLSearchParams(location.search).get('id');
  if(!id){ showMsg('⚠️ ID nahi mili'); return; }
  try{
    let books = await (await fetch('books.json?t='+Date.now())).json();
    let book = books.find(b => String(b.id) === String(id));
    if(!book){ showMsg('❌ Kitab nahi mili'); return; }
    if(book.allow_access === false){ showMsg('🔒 Yeh kitab dastiyab nahi'); return; }
    if(!book.pdf_url){ showMsg('⚠️ PDF abhi upload nahi ki gayi'); return; }
    document.title = (book.title||'Kitab') + ' — KitabGhar';
    document.getElementById('book-title').innerText = book.title||'Kitab';
    currentUrl = book.pdf_url;
    await loadPdf(book.pdf_url);
  } catch(e){ showMsg('❌ ' + e.message); }
}

async function loadPdf(url){
  try {
    showMsg('📖 PDF load ho rahi hai...');
    let loadingTask = pdfjsLib.getDocument({ url, withCredentials: false });
    pdfDoc = await loadingTask.promise;
    document.getElementById('msg').style.display = 'none';
    await renderProgressively();
  } catch(e){
    showMsg('❌ PDF load nahi hui: ' + e.message +
      '<br><br><a href="' + url + '" target="_blank" class="btn" style="display:inline-block;margin-top:1rem">⬇️ PDF Download Karein</a>');
  }
}

async function renderProgressively(){
  let container = document.getElementById('pdf-container');
  container.innerHTML = '';
  renderedPages = 0;
  let total = pdfDoc.numPages;

  let divs = [];
  for(let i = 1; i <= total; i++){
    let div = document.createElement('div');
    div.className = 'pdf-page';
    div.id = 'page-' + i;
    let ph = document.createElement('div');
    ph.className = 'page-placeholder';
    ph.style.minHeight = '400px';
    ph.innerText = 'Page ' + i + ' load ho raha hai...';
    div.appendChild(ph);
    container.appendChild(div);
    divs.push(div);
  }

  updateCounter(0, total);

  let observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        let pageNum = parseInt(entry.target.id.replace('page-',''));
        if(!entry.target.dataset.rendered){
          entry.target.dataset.rendered = 'true';
          renderPage(pageNum, entry.target, total);
        }
      }
    });
  }, { rootMargin: '300px' });

  divs.forEach(div => observer.observe(div));

  renderPage(1, divs[0], total);
  if(total > 1) renderPage(2, divs[1], total);
}

async function renderPage(pageNum, container, total){
  if(container.dataset.rendering) return;
  container.dataset.rendering = 'true';
  try{
    let page = await pdfDoc.getPage(pageNum);
    let vp = page.getViewport({scale});
    let canvas = document.createElement('canvas');
    canvas.height = vp.height;
    canvas.width = vp.width;
    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    container.innerHTML = '';
    container.appendChild(canvas);
    renderedPages++;
    updateCounter(renderedPages, total);
    updateProgressBar(renderedPages, total);
  } catch(e){
    container.innerHTML = '<div class="page-placeholder">⚠️ Page ' + pageNum + ' error</div>';
  }
}

function updateCounter(done, total){
  let el = document.getElementById('page-counter');
  if(done === 0) el.innerText = '⏳ Pages load ho rahe hain (0 / ' + total + ')';
  else if(done < total) el.innerText = '⏳ ' + done + ' / ' + total + ' pages ready';
  else el.innerText = '✅ Tamam ' + total + ' pages ready!';
}

function updateProgressBar(done, total){
  document.getElementById('progress-bar').style.width = Math.round((done/total)*100) + '%';
}

function showMsg(msg){
  let c = document.getElementById('pdf-container');
  c.innerHTML = '<div class="msg">' + msg + '<br><br><a href="index.html" style="color:#9f5bff">← Home Wapas</a></div>';
}

async function zoomIn(){ scale = Math.min(scale+0.2, 3); if(pdfDoc) await renderProgressively(); }
async function zoomOut(){ scale = Math.max(scale-0.2, 0.6); if(pdfDoc) await renderProgressively(); }
</script>
</body>
</html>
