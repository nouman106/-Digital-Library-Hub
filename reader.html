<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;background:#525659;color:#eee;overflow:hidden}
header{background:#1e1e2f;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;flex-shrink:0;z-index:100}
#book-title{font-weight:600;font-size:1rem;flex:1;text-align:center;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:#7c3aed;border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.9rem;text-decoration:none;display:inline-block;white-space:nowrap}
#pdf-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:1rem}
.pdf-page{margin:0 auto 1rem;box-shadow:0 0 10px rgba(0,0,0,0.5);max-width:900px;background:#fff;position:relative}
canvas{width:100%;height:auto;display:block}
.page-placeholder{background:#2a2a3f;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#888;font-size:.85rem;min-height:350px;gap:.6rem}
.spinner{width:26px;height:26px;border:3px solid #444;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{text-align:center;padding:3rem;color:#eee;font-size:1.1rem;line-height:2}
#progress-bar-wrap{background:#333;height:4px;width:100%;flex-shrink:0}
#progress-bar{height:4px;background:#7c3aed;width:0%;transition:width 0.4s ease}
#page-counter{text-align:center;color:#aaa;font-size:.78rem;padding:3px;background:#1e1e2f;flex-shrink:0}

#fs-overlay{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1e1e2f,#2d1b69);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  color:#fff;cursor:pointer;user-select:none;
}
.start-btn{
  background:#7c3aed;padding:14px 44px;border-radius:30px;
  font-size:1.15rem;font-weight:700;
  box-shadow:0 0 28px #7c3aed99;
  transition:transform .1s;
}
#fs-overlay:active .start-btn{transform:scale(0.96)}

#load-screen{
  position:fixed;inset:0;z-index:9998;
  background:#1e1e2f;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;gap:1.2rem;
  color:#fff;
}
#load-screen.show{display:flex}
#load-ring{width:60px;height:60px;border:5px solid #2a2a3f;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
#load-pct{color:#7c3aed;font-size:2.4rem;font-weight:700;min-width:90px;text-align:center}
#load-text{color:#a78bfa;font-size:.95rem;text-align:center;max-width:280px;line-height:1.6}
#load-bar-wrap{width:260px;height:6px;background:#2a2a3f;border-radius:10px;overflow:hidden}
#load-bar{height:6px;background:linear-gradient(90deg,#7c3aed,#a855f7);width:0%;transition:width .3s;border-radius:10px}
#load-size{color:#555;font-size:.75rem;margin-top:-.3rem}
</style>
</head>
<body>

<div id="fs-overlay">
  <div style="font-size:4rem">📖</div>
  <div style="font-size:1.7rem;font-weight:700;color:#c4b5fd">KitabGhar Reader</div>
  <div style="font-size:1rem;color:#a78bfa;text-align:center;line-height:1.9">
    Kitab padhne ke liye<br>screen par tap karein
  </div>
  <div class="start-btn">▶ Shuru Karein</div>
  <div style="font-size:0.72rem;color:#6b7280;margin-top:0.3rem">Full screen mein khulega</div>
</div>

<div id="load-screen">
  <div id="load-ring"></div>
  <div id="load-pct">0%</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-size"></div>
  <div id="load-text">Firebase se kitab aa rahi hai...</div>
</div>

<header>
  <button class="btn" onclick="goBack()">← Wapas</button>
  <span id="book-title">KitabGhar Reader</span>
  <div style="display:flex;gap:6px">
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="zoomOut()">−</button>
  </div>
</header>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="page-counter"></div>
<div id="pdf-container">
  <div class="msg" id="msg"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, scale = 1.2, currentUrl = '', renderedPages = 0, pageObserver = null;

// ===== HELPERS =====
function el(id){ return document.getElementById(id); }

function hideLoadScreen(){
  var ls = el('load-screen');
  if(ls) ls.classList.remove('show');
}
function showLoadScreen(){
  var ls = el('load-screen');
  if(ls) ls.classList.add('show');
}

// ===== FULLSCREEN =====
function enterFullscreen(){
  var e = document.documentElement;
  var p = e.requestFullscreen ? e.requestFullscreen()
        : e.webkitRequestFullscreen ? e.webkitRequestFullscreen()
        : e.mozRequestFullScreen ? e.mozRequestFullScreen()
        : e.msRequestFullscreen ? e.msRequestFullscreen() : null;
  return (p && p.catch) ? p.catch(function(){}) : Promise.resolve();
}
function isFullscreen(){
  return !!(document.fullscreenElement||document.webkitFullscreenElement||
            document.mozFullScreenElement||document.msFullscreenElement);
}
function onFsChange(){ if(!isFullscreen()) setTimeout(enterFullscreen,100); }
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','msfullscreenchange']
  .forEach(function(ev){ document.addEventListener(ev, onFsChange); });

document.addEventListener('keydown', function(e){
  if(['F11','Escape','F5'].includes(e.key)){ e.preventDefault(); e.stopPropagation(); }
  if((e.ctrlKey||e.metaKey)&&['w','W','r','R','t','T'].includes(e.key)){
    e.preventDefault(); e.stopPropagation();
  }
}, true);
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

function goBack(){
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','msfullscreenchange']
    .forEach(function(ev){ document.removeEventListener(ev, onFsChange); });
  var ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
  if(ex) ex.call(document).catch(function(){});
  setTimeout(function(){ location.href='index.html'; }, 200);
}

// ===== ENTRY SCREEN =====
var overlay = el('fs-overlay');
function startReading(){
  enterFullscreen().then(function(){
    overlay.style.display = 'none';
    init();
  }).catch(function(){
    overlay.style.display = 'none';
    init();
  });
}
overlay.addEventListener('click', startReading);
overlay.addEventListener('touchstart', function(e){
  e.preventDefault();
  startReading();
}, {passive:false});

// ===== INIT =====
function init(){
  var id = new URLSearchParams(location.search).get('id');
  if(!id){ showMsg('⚠️ ID nahi mili'); return; }

  fetch('books.json?t='+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(books){
      var book = books.find(function(b){ return String(b.id)===String(id); });
      if(!book){ showMsg('❌ Kitab nahi mili'); return; }
      if(book.allow_access===false){ showMsg('🔒 Yeh kitab dastiyab nahi'); return; }
      if(!book.pdf_url){ showMsg('⚠️ PDF abhi upload nahi ki gayi'); return; }
      document.title = (book.title||'Kitab')+' — KitabGhar';
      el('book-title').innerText = book.title||'Kitab';
      currentUrl = book.pdf_url;
      loadPdf(book.pdf_url);
    })
    .catch(function(e){ showMsg('❌ books.json error: '+e.message); });
}

// ===== PDF LOAD =====
function loadPdf(url){
  showLoadScreen();

  // Firebase URL fix
  if(url.includes('firebasestorage.googleapis.com') && !url.includes('alt=media')){
    url += (url.includes('?') ? '&' : '?') + 'alt=media';
  }

  var loadingTask = pdfjsLib.getDocument({
    url: url,
    withCredentials: false,
    disableRange: false,
    disableStream: false,
    disableAutoFetch: true,
    rangeChunkSize: 131072,
    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
    cMapPacked: true,
  });

  loadingTask.onProgress = function(data){
    if(data.total && data.total > 0){
      var pct = Math.min(Math.round((data.loaded/data.total)*100), 99);
      var loadedMB = (data.loaded/1048576).toFixed(1);
      var totalMB  = (data.total/1048576).toFixed(1);
      var lpct = el('load-pct');
      var lbar = el('load-bar');
      var ltxt = el('load-text');
      var lsize = el('load-size');
      if(lpct) lpct.innerText = pct+'%';
      if(lbar) lbar.style.width = pct+'%';
      if(lsize) lsize.innerText = loadedMB+' MB / '+totalMB+' MB';
      if(ltxt) ltxt.innerText = pct < 30 ? '🔗 Firebase se connect ho raha hai...'
                              : pct < 70 ? '📚 Kitab load ho rahi hai...'
                              :             '📖 Pehla page khul raha hai...';
    }
  };

  loadingTask.promise.then(function(pdf){
    pdfDoc = pdf;
    var lpct = el('load-pct');
    var lbar = el('load-bar');
    if(lpct) lpct.innerText = '100%';
    if(lbar) lbar.style.width = '100%';
    setTimeout(function(){
      hideLoadScreen();
      renderProgressively();
    }, 300);
  }).catch(function(e){
    hideLoadScreen();
    var extra = '';
    if(e.message && (e.message.includes('CORS') || e.message.includes('fetch'))){
      extra = '<br><small style="color:#f87171">Firebase CORS settings check karein</small>';
    }
    showMsg('❌ PDF load nahi hui: '+(e.message||'Unknown error')+extra+
      );
  });
}

// ===== RENDER =====
function renderProgressively(){
  if(pageObserver){ pageObserver.disconnect(); pageObserver=null; }
  var container = el('pdf-container');
  container.innerHTML = '';
  renderedPages = 0;
  var total = pdfDoc.numPages;
  var divs = [];

  for(var i=1; i<=total; i++){
    var div = document.createElement('div');
    div.className = 'pdf-page';
    div.id = 'page-'+i;
    div.innerHTML = '<div class="page-placeholder"><div class="spinner"></div><span style="color:#666;font-size:.8rem">Page '+i+'</span></div>';
    container.appendChild(div);
    divs.push(div);
  }

  updateCounter(0, total);

  pageObserver = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var num = parseInt(entry.target.id.replace('page-',''));
        if(!entry.target.dataset.rendered){
          entry.target.dataset.rendered = 'true';
          renderPage(num, entry.target, total);
        }
      }
    });
  }, { root: container, rootMargin: '500px' });

  divs.forEach(function(d){ pageObserver.observe(d); });

  // Page 1 & 2 foran
  renderPage(1, divs[0], total);
  if(total > 1) renderPage(2, divs[1], total);
}

function renderPage(pageNum, container, total){
  if(container.dataset.rendering) return;
  container.dataset.rendering = 'true';
  pdfDoc.getPage(pageNum).then(function(page){
    var vp = page.getViewport({scale: scale});
    var canvas = document.createElement('canvas');
    var dpr = Math.min(window.devicePixelRatio||1, 2);
    canvas.width = vp.width * dpr;
    canvas.height = vp.height * dpr;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return page.render({canvasContext: ctx, viewport: vp}).promise.then(function(){
      container.innerHTML = '';
      container.appendChild(canvas);
      renderedPages++;
      updateCounter(renderedPages, total);
      updateProgressBar(renderedPages, total);
    });
  }).catch(function(){
    container.innerHTML = '<div class="page-placeholder" style="min-height:80px"><span>⚠️ Page '+pageNum+' error</span></div>';
  });
}

function updateCounter(done, total){
  var e = el('page-counter');
  if(!e) return;
  e.innerText = done===0   ? '⏳ Pages load ho rahe hain...'
              : done<total ? '⏳ '+done+' / '+total+' pages ready'
              :              '✅ Tamam '+total+' pages ready!';
}
function updateProgressBar(done, total){
  var e = el('progress-bar');
  if(e) e.style.width = Math.round((done/total)*100)+'%';
}
function showMsg(msg){
  hideLoadScreen();
  var c = el('pdf-container');
  if(c) c.innerHTML = '<div class="msg">'+msg+'<br><br><a href="index.html" style="color:#9f5bff">← Home Wapas</a></div>';
}
function zoomIn(){ scale=Math.min(scale+0.2,3); if(pdfDoc) renderProgressively(); }
function zoomOut(){ scale=Math.max(scale-0.2,0.6); if(pdfDoc) renderProgressively(); }
</script>
</body>
</html>
