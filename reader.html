<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kitab Parh Rahe Hain — KitabGhar</title>
<!-- PDF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
:root{
  --bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;
  --text:#e8e8f8;--text2:#a0a0c8;--text3:#6060a0;
  --primary:#7c3aed;--primary2:#9f5bff;--primary-light:#1e1040;
  --secondary:#06b6d4;--border:#1e1e4a;--border2:#1a1a3e;
  --card:#0f0f2a;--radius:14px;--radius-sm:8px;
  --font:'Segoe UI',Tahoma,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font)}
body{display:flex;flex-direction:column;background:#0a0a1a;color:#eee}
.reader-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1rem;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(6px);
  flex-shrink:0;
  gap:.5rem;
  flex-wrap:wrap;
  z-index:10;
}
.header-left{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
.back-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:inherit;border-radius:20px;padding:5px 14px;font-size:.82rem;cursor:pointer;
}
.back-btn:hover{background:rgba(255,255,255,.28)}
.book-title-bar{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9}
.header-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.hdr-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:inherit;border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;
}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.reader-body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.pdf-container{width:100%;height:100%;overflow:auto;background:#525659;}
.pdf-viewer{width:100%;margin:0 auto;background:#eee;box-shadow:0 0 10px rgba(0,0,0,0.2);}
canvas{display:block;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:inherit;z-index:5;
}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.8);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;padding:2rem;text-align:center;
}
.error-icon{font-size:3rem}
.error-msg{font-size:1rem;opacity:.85}
.error-hint{font-size:.82rem;opacity:.6}
.wallpaper{position:fixed;inset:0;background-size:cover;background-position:center;z-index:-1;opacity:.18}
@media(max-width:500px){.book-title-bar{font-size:.82rem}.hdr-btn span{display:none}}
</style>
</head>
<body>
<div class="wallpaper" id="wallpaper"></div>
<div class="reader-header">
  <div class="header-left">
    <button class="back-btn" onclick="goBack()">← Wapas</button>
    <div class="book-title-bar" id="book-title">Kitab Load Ho Rahi Hai...</div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" id="zoom-in" onclick="zoomIn()">🔍+</button>
    <button class="hdr-btn" id="zoom-out" onclick="zoomOut()">🔍−</button>
    <button class="hdr-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
</div>
<div class="reader-body" id="reader-body">
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Kitab khul rahi hai...</div></div>
  <div class="error-box" id="error-box">
    <div class="error-icon">📭</div>
    <div class="error-msg" id="error-msg">PDF load nahi ho saka</div>
    <div class="error-hint" id="error-hint"></div>
    <button class="back-btn" style="margin-top:.5rem" onclick="goBack()">← Home</button>
  </div>
  <div class="pdf-container" id="pdf-container" style="display:none">
    <div class="pdf-viewer" id="pdf-viewer"></div>
  </div>
</div>

<script>
// ========== SECURITY: Block Right-click, Save Shortcuts, DevTools ==========
(function() {
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P' || e.key === 'u' || e.key === 'U')) {
      e.preventDefault();
      return false;
    }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); return false; }
    if (e.key === 'F12') { e.preventDefault(); return false; }
  });
})();

// ========== DB ==========
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('kitabghar_db',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=rej;
  });
}
function dbGet(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}

// ========== PDF.js Setup ==========
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let pdfDoc = null, pageNum = 1, pageRendering = false, pageNumPending = null, scale = 1.2;
const canvasContainer = document.getElementById('pdf-viewer');
let currentPdfData = null;

function renderPage(num) {
  pageRendering = true;
  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale: scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    canvasContainer.innerHTML = '';
    canvasContainer.appendChild(canvas);
    const renderContext = { canvasContext: context, viewport: viewport };
    page.render(renderContext).promise.then(() => {
      pageRendering = false;
      if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
    });
  });
}

function queueRenderPage(num) {
  if (pageRendering) { pageNumPending = num; } else { renderPage(num); }
}

function zoomIn() {
  scale = Math.min(scale + 0.2, 3.0);
  if (pdfDoc) renderPage(pageNum);
}
function zoomOut() {
  scale = Math.max(scale - 0.2, 0.6);
  if (pdfDoc) renderPage(pageNum);
}

// ========== LOAD BOOK ==========
async function init(){
  const params = new URLSearchParams(window.location.search);
  const bookId = parseInt(params.get('id'));
  if(!bookId){ showError('Kitab ID nahi mili',''); return; }
  try{
    await openDB();
    const book = await dbGet('books', bookId);
    if(!book){ showError('Kitab nahi mili','Shayad kitab delete ho gayi'); return; }
    loadBook(book);
  }catch(e){ showError('Error: '+e.message,'Refresh karein'); }
}

function loadBook(book){
  const bg = book.bg_color || '#0a0a1a';
  const tc = book.text_color || '#eeeeee';
  const wallpaper = book.wallpaper_url || '';
  document.body.style.background = bg;
  document.body.style.color = tc;
  if(wallpaper) document.getElementById('wallpaper').style.backgroundImage = `url('${wallpaper}')`;
  document.title = (book.title||'Kitab')+' — KitabGhar';
  document.getElementById('book-title').textContent = book.title||'Kitab';

  let pdfData = book.pdf_url;
  if(!pdfData){ showError('PDF link nahi hai','Admin se rabta karein'); return; }

  // Convert to blob if base64
  let blobUrl = null;
  if(pdfData.startsWith('data:application/pdf')){
    try{
      const base64 = pdfData.split(',')[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], {type:'application/pdf'});
      blobUrl = URL.createObjectURL(blob);
      loadPdf(blobUrl);
    } catch(e){ showError('PDF corrupt hai','Dobara upload karein'); }
  } else {
    // URL — use PDF.js directly
    loadPdf(pdfData);
  }
}

function loadPdf(src){
  document.getElementById('loading').style.display = 'flex';
  pdfjsLib.getDocument(src).promise.then(pdf => {
    pdfDoc = pdf;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pdf-container').style.display = 'block';
    renderPage(1);
  }).catch(err => {
    showError('PDF load nahi ho saka', 'Check URL ya file format');
  });
}

function showError(msg,hint){
  document.getElementById('loading').style.display='none';
  document.getElementById('pdf-container').style.display='none';
  const box = document.getElementById('error-box');
  box.style.display='flex';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-hint').textContent = hint||'';
}

function goBack(){
  if(document.referrer && document.referrer.includes('index')) history.back();
  else window.location.href = 'index.html';
}

function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

init();
</script>
</body>
</html>
