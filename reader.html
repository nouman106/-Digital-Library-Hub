<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="site-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Light / Dark themes ── */
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;color:#eee;transition:background .3s}
body.dark{background:#525659}
body.light{background:#d8d8d8;color:#111}

header{background:#1e1e2f;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:.6rem;flex-wrap:wrap;flex-shrink:0}
body.light header{background:#2e2e4f}

#book-title{font-weight:600;font-size:.95rem;flex:1;text-align:center;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.btn{background:#7c3aed;border:none;color:#fff;padding:6px 13px;border-radius:20px;cursor:pointer;font-size:.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:background .2s;white-space:nowrap}
.btn:hover{background:#6d28d9}

/* ── Toolbar rows ── */
#toolbar-top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;width:100%}
#toolbar-bottom{background:#16162a;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;flex-shrink:0}
body.light #toolbar-bottom{background:#2a2a50}

/* ── Page nav bar ── */
#page-info{color:#ccc;font-size:.85rem;display:flex;align-items:center;gap:6px}
#page-input{width:46px;padding:3px 6px;border-radius:8px;border:1px solid #555;background:#333;color:#fff;font-size:.85rem;text-align:center}
body.light #page-input{background:#e0e0e0;color:#111;border-color:#aaa}

/* ── Progress bar ── */
#progress-bar-wrap{height:3px;background:#333;flex-shrink:0}
#progress-bar{height:3px;background:#7c3aed;width:0%;transition:width .3s}

/* ── PDF container ── */
#pdf-container{flex:1;overflow:auto;padding:1rem;scroll-behavior:smooth}
.pdf-page{margin:0 auto 1rem;box-shadow:0 0 10px rgba(0,0,0,.5);max-width:900px;background:#fff;user-select:none;-webkit-user-select:none}
canvas{width:100%;height:auto;display:block}
.msg{text-align:center;padding:3rem;font-size:1.1rem;line-height:2}
#loading{text-align:center;padding:1rem;color:#ccc;font-size:.9rem}

/* ── Bookmark toast ── */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:8px 20px;border-radius:20px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .4s;z-index:999}
#toast.show{opacity:1}

/* ── Fullscreen tweaks ── */
:fullscreen body,::backdrop{background:#525659}
</style>
</head>
<body class="dark" data-page="reader">

<header>
  <div id="toolbar-top">
    <!-- Left -->
    <button class="btn" onclick="location.href='index.html'">← Wapas</button>
    <!-- Title -->
    <span id="book-title" style="flex:1">KitabGhar Reader</span>
    <!-- Right controls -->
    <button class="btn" onclick="zoomOut()" title="Zoom Out">🔍−</button>
    <button class="btn" onclick="zoomIn()" title="Zoom In">🔍+</button>
    <button class="btn" onclick="toggleTheme()" id="theme-btn" title="Theme">🌙</button>
    <button class="btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    <button class="btn" onclick="saveBookmark()" title="Bookmark">🔖</button>
  </div>
</header>

<!-- Progress bar -->
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- PDF area -->
<div id="pdf-container">
  <div class="msg" id="msg">📖 Kitab load ho rahi hai...</div>
</div>

<!-- Bottom nav bar -->
<div id="toolbar-bottom">
  <button class="btn" onclick="prevPage()">◀ Pehle</button>
  <div id="page-info">
    Page
    <input id="page-input" type="number" min="1" value="1" onchange="jumpToPage(this.value)" />
    / <span id="total-pages">—</span>
  </div>
  <button class="btn" onclick="nextPage()">Agle ▶</button>
</div>

<div id="toast">🔖 Bookmark save ho gaya!</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let pdfDoc = null, scale = 1.2, currentUrl = '', bookId = '', totalPages = 0;

/* ─── Init ─────────────────────────────────────── */
async function init(){
  bookId = new URLSearchParams(location.search).get('id') || '';
  if(!bookId){ showMsg('⚠️ ID nahi mili'); return; }

  // Restore saved theme
  let savedTheme = localStorage.getItem('kg_theme') || 'dark';
  setTheme(savedTheme);

  try{
    let books = await (await fetch('books.json?t='+Date.now())).json();
    let book  = books.find(b => String(b.id) === String(bookId));
    if(!book){ showMsg('❌ Kitab nahi mili'); return; }
    if(book.allow_access === false){ showMsg('🔒 Yeh kitab dastiyab nahi'); return; }
    if(!book.pdf_url){ showMsg('⚠️ PDF abhi upload nahi ki gayi'); return; }
    document.title = (book.title||'Kitab') + ' — KitabGhar';
    document.getElementById('book-title').innerText = book.title||'Kitab';
    currentUrl = book.pdf_url;
    await loadPdf(book.pdf_url);
  } catch(e){ showMsg('❌ ' + e.message); }
}

/* ─── PDF Load ──────────────────────────────────── */
async function loadPdf(url){
  try{
    showMsg('📖 PDF load ho rahi hai...');
    pdfDoc = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('total-pages').innerText = totalPages;
    document.getElementById('page-input').max = totalPages;
    document.getElementById('msg').style.display = 'none';
    await renderAllPages();

    // Restore bookmark after render
    let saved = localStorage.getItem('kg_bookmark_' + bookId);
    if(saved){
      let pg = parseInt(saved);
      if(pg > 1) scrollToPage(pg);
    }

    // Scroll → update page indicator
    document.getElementById('pdf-container').addEventListener('scroll', onScroll);
  } catch(e){
    console.error(e);
    showMsg('❌ PDF load nahi hui: ' + e.message);
  }
}

/* ─── Render All Pages ──────────────────────────── */
async function renderAllPages(){
  let container = document.getElementById('pdf-container');
  container.innerHTML = '<div id="loading">⏳ Pages render ho rahe hain...</div>';

  for(let i = 1; i <= pdfDoc.numPages; i++){
    let page = await pdfDoc.getPage(i);
    let vp   = page.getViewport({ scale });
    let canvas = document.createElement('canvas');
    canvas.height = vp.height;
    canvas.width  = vp.width;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

    let div = document.createElement('div');
    div.className   = 'pdf-page';
    div.dataset.page = i;
    div.appendChild(canvas);
    container.appendChild(div);

    let loading = document.getElementById('loading');
    if(loading) loading.remove();
  }
  updateProgress();
}

/* ─── Scroll → Page Tracking ────────────────────── */
function onScroll(){
  let container = document.getElementById('pdf-container');
  let pages = container.querySelectorAll('.pdf-page');
  let midY  = container.scrollTop + container.clientHeight / 2;
  let cur   = 1;
  pages.forEach(p => {
    if(p.offsetTop <= midY) cur = parseInt(p.dataset.page);
  });
  document.getElementById('page-input').value = cur;
  updateProgress(cur);
}

function updateProgress(cur){
  if(!totalPages) return;
  let pg = cur || parseInt(document.getElementById('page-input').value) || 1;
  let pct = (pg / totalPages) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

/* ─── Page Navigation ───────────────────────────── */
function scrollToPage(pg){
  pg = Math.max(1, Math.min(pg, totalPages));
  let div = document.querySelector(`.pdf-page[data-page="${pg}"]`);
  if(div) div.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('page-input').value = pg;
  updateProgress(pg);
}

function prevPage(){
  let cur = parseInt(document.getElementById('page-input').value) || 1;
  scrollToPage(cur - 1);
}

function nextPage(){
  let cur = parseInt(document.getElementById('page-input').value) || 1;
  scrollToPage(cur + 1);
}

function jumpToPage(val){
  let pg = parseInt(val);
  if(!isNaN(pg)) scrollToPage(pg);
}

/* ─── Zoom ──────────────────────────────────────── */
function zoomIn() { scale = Math.min(scale+0.2, 3);   if(pdfDoc) renderAllPages(); }
function zoomOut(){ scale = Math.max(scale-0.2, 0.6);  if(pdfDoc) renderAllPages(); }

/* ─── Theme ─────────────────────────────────────── */
function setTheme(t){
  document.body.classList.remove('dark','light');
  document.body.classList.add(t);
  document.getElementById('theme-btn').innerText = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('kg_theme', t);
}
function toggleTheme(){
  setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
}

/* ─── Fullscreen ────────────────────────────────── */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}

/* ─── Bookmark ──────────────────────────────────── */
function saveBookmark(){
  if(!bookId) return;
  let pg = parseInt(document.getElementById('page-input').value) || 1;
  localStorage.setItem('kg_bookmark_' + bookId, pg);
  let toast = document.getElementById('toast');
  toast.innerText = '🔖 Page ' + pg + ' bookmark ho gaya!';
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2200);
}

/* ─── Error message ─────────────────────────────── */
function showMsg(msg){
  document.getElementById('pdf-container').innerHTML =
    '<div class="msg">' + msg + '<br><br><a href="index.html" style="color:#9f5bff">← Home Wapas</a></div>';
}

/* ─── Download / Save / Print prevent ──────────── */
document.addEventListener('contextmenu', e => e.preventDefault());

// Ctrl+S, Ctrl+P, Ctrl+U band karo
document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key.toLowerCase())){
    e.preventDefault(); return false;
  }
});

// Canvas drag se image save band
document.addEventListener('dragstart', e => e.preventDefault());

// Print dialog band
window.print = function(){ return false; };

init();
</script>
</body>
</html>
