<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee}
header{background:#1e1e2f;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;flex-shrink:0}
#book-title{font-weight:600;font-size:1rem;flex:1;text-align:center}
.btn{background:#7c3aed;border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.9rem;text-decoration:none;display:inline-block}
#reader-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
#pdf-iframe{width:100%;flex:1;border:none}
.msg{text-align:center;padding:3rem;color:#ccc;font-size:1.1rem}
</style>
</head>
<body>
<header>
  <button class="btn" onclick="location.href='index.html'">← Wapas</button>
  <span id="book-title">KitabGhar Reader</span>
  <a id="dl-btn" class="btn" target="_blank" href="#" style="display:none">⬇️ Download</a>
</header>
<div id="reader-area">
  <div class="msg" id="msg">📖 Load ho rahi hai...</div>
  <iframe id="pdf-iframe" style="display:none"></iframe>
</div>
<script>
async function init(){
  let id=new URLSearchParams(location.search).get('id');
  if(!id){showMsg('⚠️ ID nahi mili');return;}
  try{
    let books=await(await fetch('books.json?t='+Date.now())).json();
    let book=books.find(b=>String(b.id)===String(id));
    if(!book){showMsg('❌ Kitab nahi mili');return;}
    if(book.allow_access===false){showMsg('🔒 Dastiyab nahi');return;}
    if(!book.pdf_url){showMsg('⚠️ PDF upload nahi ki gayi');return;}
    document.title=(book.title||'Kitab')+' — KitabGhar';
    document.getElementById('book-title').innerText=book.title||'Kitab';
    if(book.allow_download!==false){
      let b=document.getElementById('dl-btn');
      b.href=book.pdf_url;b.style.display='inline-block';
    }
    let iframe=document.getElementById('pdf-iframe');
    iframe.src=book.pdf_url;
    iframe.style.display='block';
    document.getElementById('msg').style.display='none';
  }catch(e){showMsg('❌ '+e.message);}
}
function showMsg(msg){
  document.getElementById('msg').innerHTML=msg+'<br><br><a href="index.html" style="color:#7c3aed">← Wapas</a>';
  document.getElementById('pdf-iframe').style.display='none';
}
init();
</script>
</body>
</html>
