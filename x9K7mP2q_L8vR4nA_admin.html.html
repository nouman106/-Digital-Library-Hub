<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KitabGhar Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{--bg:#0a0a1a;--bg2:#0f0f2a;--bg3:#13132e;--text:#e8e8f8;--text2:#a0a0c8;--text3:#6060a0;--primary:#7c3aed;--primary2:#9f5bff;--border:#1e1e4a;--border2:#1a1a3e;--card:#0f0f2a;--radius:14px;--radius-sm:8px;--font:'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer}
input,select,textarea{font-family:var(--font);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text)}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d0928,#1a1050)}
.login-card{background:var(--bg2);border-radius:14px;padding:2rem;width:320px}
.login-title{font-size:1.5rem;font-weight:700;color:var(--primary);text-align:center}
.login-field{margin:1rem 0}
.login-field input{width:100%}
.login-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px}
.admin-nav{background:linear-gradient(135deg,#0d0928,var(--primary));color:#fff;padding:.8rem 1.5rem;display:flex;justify-content:space-between}
.admin-body{max-width:1200px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:.5rem;border-bottom:2px solid var(--border);margin-bottom:1rem}
.tab-btn{padding:8px 20px;background:none;border:none;color:var(--text2);cursor:pointer}
.tab-btn.active{background:var(--primary);color:#fff;border-radius:8px 8px 0 0}
.tab-pane{display:none}
.tab-pane.active{display:block}
.card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:1.2rem;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-row.single{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:.3rem}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text2)}
.btn-danger{background:#f44336}
.stats-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1rem}
.stat-mini-card{background:var(--card);border-radius:12px;padding:1rem;text-align:center}
.stat-mini-num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--primary2),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border2)}
.cover-thumb{width:36px;height:48px;object-fit:cover}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:10px 18px;border-radius:8px;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="login-screen"><div class="login-card"><div class="login-title">🔐 Admin Login</div><div class="login-field"><input type="password" id="login-pass" placeholder="Password"/></div><button class="login-btn" onclick="doLogin()">Login</button><div id="login-err" style="color:#f44336;display:none">Galat password!</div></div></div>
<div id="admin-panel" style="display:none">
  <div class="admin-nav"><div>⚙️ KitabGhar Admin Panel</div><div><button class="btn" onclick="location.href='index.html'">🌐 Website</button><button class="btn btn-outline" onclick="logout()">🚪 Logout</button></div></div>
  <div class="admin-body">
    <div class="tabs"><button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button><button class="tab-btn" data-tab="books">📚 Books</button><button class="tab-btn" data-tab="add-book">➕ Add Book</button><button class="tab-btn" data-tab="settings">⚙️ Settings</button><button class="tab-btn" data-tab="analytics">📈 Analytics</button><button class="tab-btn" data-tab="messages">💬 Messages</button><button class="tab-btn" data-tab="backup">💾 Backup</button></div>
    <div id="tab-dashboard" class="tab-pane active"><div class="stats-mini"><div class="stat-mini-card"><div class="stat-mini-num" id="d-total">0</div><div>Kul Kitabein</div></div><div class="stat-mini-card"><div class="stat-mini-num" id="d-free">0</div><div>Muft</div></div><div class="stat-mini-card"><div class="stat-mini-num" id="d-paid">0</div><div>Paid</div></div></div><div class="card"><h3>Haali Kitabein</h3><div id="dashboard-recent"></div></div></div>
    <div id="tab-books" class="tab-pane"><div class="card"><table><thead><tr><th>Cover</th><th>Naam</th><th>Musannif</th><th>Category</th><th>Qeemat</th><th>Access</th><th>Download</th><th>Views</th><th>Actions</th></tr></thead><tbody id="books-tbody"></tbody></table></div></div>
    <div id="tab-add-book" class="tab-pane"><div class="card"><input type="hidden" id="edit-id"/><div class="form-row"><div class="field"><label>Kitab Naam *</label><input id="b-title"/></div><div class="field"><label>Musannif</label><input id="b-author"/></div></div><div class="form-row"><div class="field"><label>Category</label><select id="b-category"><option value="islamic">Islami</option><option value="educational">Talimi</option><option value="motivational">Hosla Afzai</option><option value="kids">Bachon Ki</option><option value="other">Aur</option></select></div><div class="field"><label>Qeemat (0=Muft)</label><input id="b-price" value="0"/></div></div><div class="form-row single"><div class="field"><label>PDF URL ya upload</label><input id="b-pdf-url"/><input type="file" id="pdf-file" accept=".pdf" onchange="uploadFile(this,'b-pdf-url')"/></div></div><div class="form-row single"><div class="field"><label>Cover URL ya upload</label><input id="b-cover-url"/><input type="file" id="cover-file" accept="image/*" onchange="uploadFile(this,'b-cover-url')"/></div></div><div class="form-row"><div class="field"><label>Background Color</label><input type="color" id="b-bg-color" value="#0a0a1a"/></div><div class="field"><label>Text Color</label><input type="color" id="b-text-color" value="#eeeeee"/></div><div class="field"><label>Font</label><select id="b-reader-font"><option>serif</option><option>sans-serif</option></select></div></div><div class="form-row single"><div class="field"><label>Description</label><textarea id="b-desc" rows="2"></textarea></div></div><div class="form-row"><div class="field"><label><input type="checkbox" id="b-allow-access" checked/> Allow Access (parhne ki ijazat)</label></div><div class="field"><label><input type="checkbox" id="b-allow-download" checked/> Allow Download (download ki ijazat)</label></div></div><div><button class="btn" onclick="saveBook()">Save</button><button class="btn btn-outline" onclick="clearForm()">Reset</button></div></div></div>
    <div id="tab-settings" class="tab-pane"><div class="card"><h3>Website Info</h3><div class="form-row"><div class="field"><label>Site Name</label><input id="s-site-name"/></div><div class="field"><label>Tagline</label><input id="s-tagline"/></div></div><div class="form-row single"><div class="field"><label>Description</label><input id="s-desc"/></div></div><div class="form-row single"><div class="field"><label>About Text</label><textarea id="s-about" rows="3"></textarea></div></div><div class="form-row single"><div class="field"><label>Footer Text</label><input id="s-footer"/></div></div><div class="form-row single"><div class="field"><label>Announcement Bar</label><input id="s-announcement"/></div></div><div class="form-row single"><div class="field"><label>Slider Images (JSON array)</label><textarea id="s-slider" rows="2" placeholder='["url1","url2","url3"]'></textarea></div></div><div class="form-row single"><div class="field"><label>Logo URL</label><input id="s-logo"/></div></div><h3>Colors</h3><div class="form-row"><div class="field"><label>Primary</label><input type="color" id="s-primary"/></div><div class="field"><label>Secondary</label><input type="color" id="s-secondary"/></div></div><div class="form-row"><div class="field"><label>Background</label><input type="color" id="s-bg"/></div><div class="field"><label>Card BG</label><input type="color" id="s-card"/></div></div><div class="form-row"><div class="field"><label>Text</label><input type="color" id="s-text"/></div><div class="field"><label>Border</label><input type="color" id="s-border"/></div></div><div class="form-row single"><div class="field"><label>Hero Gradient (CSS)</label><input id="s-hero-gradient"/></div></div><button class="btn" onclick="saveSettings()">Save Settings</button></div></div>
    <div id="tab-analytics" class="tab-pane"><div class="stats-mini"><div class="stat-mini-card"><div class="stat-mini-num" id="total-views">0</div><div>Total Site Views</div></div><div class="stat-mini-card"><div class="stat-mini-num" id="active-users">0</div><div>Live Users (5 min)</div></div></div><div class="card"><h3>📈 Top 10 Books by Views</h3><div id="top-views"></div></div><div class="card"><h3>⬇️ Top 10 Books by Downloads</h3><div id="top-downloads"></div></div></div>
    <div id="tab-messages" class="tab-pane"><div class="card"><h3>Contact Messages</h3><div id="messages-list"></div></div></div>
    <div id="tab-backup" class="tab-pane"><div class="card"><button class="btn" onclick="exportData()">📤 Export All Books (JSON)</button><button class="btn" onclick="importData()">📥 Import Books from JSON</button><input type="file" id="import-file" accept=".json" style="display:none"/></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let adminPass = localStorage.getItem('admin_pass') || 'admin123';
function doLogin(){ let p=document.getElementById('login-pass').value; if(p===adminPass){ document.getElementById('login-screen').style.display='none'; document.getElementById('admin-panel').style.display='block'; loadAdminData(); } else { document.getElementById('login-err').style.display='block'; setTimeout(()=>document.getElementById('login-err').style.display='none',2000); } }
function logout(){ document.getElementById('admin-panel').style.display='none'; document.getElementById('login-screen').style.display='flex'; }
async function loadAdminData(){ await loadBooksAdmin(); await loadSettingsForm(); await loadAnalytics(); await loadMessages(); }
let allBooks=[];
async function loadBooksAdmin(){ let {data}=await supabase.from('books').select('*'); allBooks=data||[]; renderBooksTable(); renderDashboard(); }
function renderBooksTable(){ let tbody=document.getElementById('books-tbody'); tbody.innerHTML=allBooks.map(b=>`<tr><td>${b.cover_url?`<img src="${b.cover_url}" class="cover-thumb">`:'📖'}</td><td>${b.title}</td><td>${b.author||'-'}</td><td>${b.category}</td><td>${b.price==0||b.price=='0'?'Muft':'Rs.'+b.price}</td><td>${b.allow_access?'✅':'❌'}</td><td>${b.allow_download?'✅':'❌'}</td><td>${b.views||0}</td><td><button class="btn btn-outline" onclick="editBook(${b.id})">✏️</button><button class="btn btn-danger" onclick="deleteBook(${b.id})">🗑️</button></td></tr>`).join(''); }
function renderDashboard(){ let free=allBooks.filter(b=>b.price==0||b.price=='0').length; document.getElementById('d-total').innerText=allBooks.length; document.getElementById('d-free').innerText=free; document.getElementById('d-paid').innerText=allBooks.length-free; let recent=allBooks.slice(-5).reverse(); document.getElementById('dashboard-recent').innerHTML=recent.map(b=>`<div>📖 ${b.title} — ${b.author||'?'}</div>`).join(''); }
async function saveBook(){ let id=document.getElementById('edit-id').value; let book={ title:document.getElementById('b-title').value, author:document.getElementById('b-author').value, category:document.getElementById('b-category').value, price:document.getElementById('b-price').value, pdf_url:document.getElementById('b-pdf-url').value, cover_url:document.getElementById('b-cover-url').value, bg_color:document.getElementById('b-bg-color').value, text_color:document.getElementById('b-text-color').value, reader_font:document.getElementById('b-reader-font').value, description:document.getElementById('b-desc').value, allow_access:document.getElementById('b-allow-access').checked, allow_download:document.getElementById('b-allow-download').checked }; if(id) book.id=parseInt(id); let {error}=id?await supabase.from('books').update(book).eq('id',id):await supabase.from('books').insert([book]); if(error) alert(error.message); else{ showToast(id?'Book updated':'Book added'); clearForm(); loadBooksAdmin(); } }
function editBook(id){ let b=allBooks.find(b=>b.id==id); if(!b)return; document.getElementById('edit-id').value=b.id; document.getElementById('b-title').value=b.title||''; document.getElementById('b-author').value=b.author||''; document.getElementById('b-category').value=b.category||''; document.getElementById('b-price').value=b.price; document.getElementById('b-pdf-url').value=b.pdf_url||''; document.getElementById('b-cover-url').value=b.cover_url||''; document.getElementById('b-bg-color').value=b.bg_color||'#0a0a1a'; document.getElementById('b-text-color').value=b.text_color||'#eeeeee'; document.getElementById('b-reader-font').value=b.reader_font||'serif'; document.getElementById('b-desc').value=b.description||''; document.getElementById('b-allow-access').checked=b.allow_access!==false; document.getElementById('b-allow-download').checked=b.allow_download!==false; }
async function deleteBook(id){ if(!confirm('Delete this book?'))return; await supabase.from('books').delete().eq('id',id); loadBooksAdmin(); }
function clearForm(){ document.getElementById('edit-id').value=''; ['b-title','b-author','b-price','b-pdf-url','b-cover-url','b-desc'].forEach(id=>document.getElementById(id).value=''); document.getElementById('b-category').value='islamic'; document.getElementById('b-bg-color').value='#0a0a1a'; document.getElementById('b-text-color').value='#eeeeee'; document.getElementById('b-allow-access').checked=true; document.getElementById('b-allow-download').checked=true; }
async function loadSettingsForm(){ let {data}=await supabase.from('settings').select('*'); if(data) data.forEach(s=>{ let el=document.getElementById(`s-${s.key}`); if(el) el.value=s.value; }); }
async function saveSettings(){ let keys=['site_name','site_tagline','site_desc','about_text','footer_text','primary_color','secondary_color','bg_color','card_color','text_color','border_color','hero_gradient','announcement','slider_images','logo_url']; for(let k of keys){ let val=document.getElementById(`s-${k}`)?.value; if(val) await supabase.from('settings').upsert({key:k,value:val}); } showToast('Settings saved'); }
async function loadAnalytics(){ let {data:visits}=await supabase.from('site_visits').select('id',{count:'exact'}); document.getElementById('total-views').innerText=visits?.length||0; let fiveMinsAgo=new Date(Date.now()-5*60*1000).toISOString(); let {count}=await supabase.from('active_sessions').select('*',{count:'exact',head:true}).gte('last_seen',fiveMinsAgo); document.getElementById('active-users').innerText=count||0; let {data:topViews}=await supabase.from('books').select('title,views').order('views',{ascending:false}).limit(10); document.getElementById('top-views').innerHTML=topViews.map(b=>`<div>${b.title} — ${b.views||0} views</div>`).join('')||'No data'; let {data:topDls}=await supabase.from('books').select('title,downloads').order('downloads',{ascending:false}).limit(10); document.getElementById('top-downloads').innerHTML=topDls.map(b=>`<div>${b.title} — ${b.downloads||0} reads</div>`).join('')||'No data'; }
async function loadMessages(){ let {data}=await supabase.from('contact_messages').select('*').order('created_at',{ascending:false}); document.getElementById('messages-list').innerHTML=data?.map(m=>`<div style="border-bottom:1px solid #ccc;padding:8px"><strong>${m.name}</strong> (${m.email})<br>${m.message}<br><small>${new Date(m.created_at).toLocaleString()}</small></div>`).join('')||'No messages'; }
function uploadFile(input, targetId){ let file=input.files[0]; if(!file)return; let reader=new FileReader(); reader.onload=e=>{ document.getElementById(targetId).value=e.target.result; showToast('File uploaded (base64)'); }; reader.readAsDataURL(file); }
async function exportData(){ let {data}=await supabase.from('books').select('*'); let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kitabghar_backup.json'; a.click(); }
function importData(){ document.getElementById('import-file').click(); document.getElementById('import-file').onchange=async(e)=>{ let file=e.target.files[0]; if(!file)return; let text=await file.text(); let books=JSON.parse(text); for(let b of books){ delete b.id; delete b.created_at; await supabase.from('books').insert([b]); } showToast('Import completed'); loadBooksAdmin(); }; }
function showToast(msg){ let t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active')); document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active'); if(btn.dataset.tab==='analytics') loadAnalytics(); if(btn.dataset.tab==='messages') loadMessages(); }); });
</script>
</body>
</html>
