<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<!-- Updated PDF.js version for better performance -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --purple: #7c3aed;
    --purple-dim: rgba(124,58,237,0.85);
    --glass: rgba(15,15,25,0.82);
    --text: #f0eaff;
  }

  body{
    background:#080810;
    height:100vh;
    overflow:hidden;
    cursor:none;
    font-family:'Noto Nastaliq Urdu', sans-serif;
  }

  /* ── SKELETON / SHIMMER LOADING ── */
  #skeleton{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:1.2rem;
    z-index:200;
    background:#080810;
  }
  .sk-title{
    width:260px;height:18px;border-radius:6px;
    background:linear-gradient(90deg,#1a1a2e 25%,#2a2a4e 50%,#1a1a2e 75%);
    background-size:400% 100%;
    animation:shimmer 1.4s infinite;
  }
  .sk-page{
    width:min(420px,88vw);
    height:min(560px,72vh);
    border-radius:10px;
    background:linear-gradient(90deg,#1a1a2e 25%,#252545 50%,#1a1a2e 75%);
    background-size:400% 100%;
    animation:shimmer 1.4s infinite;
    border:1px solid rgba(124,58,237,0.15);
    box-shadow:0 0 60px rgba(124,58,237,0.08);
  }
  .sk-nav{
    display:flex;gap:1rem;align-items:center;
  }
  .sk-btn{
    width:80px;height:36px;border-radius:20px;
    background:linear-gradient(90deg,#1e1e38 25%,#2a2a50 50%,#1e1e38 75%);
    background-size:400% 100%;
    animation:shimmer 1.4s infinite;
  }
  .sk-pg{
    width:60px;height:18px;border-radius:6px;
    background:linear-gradient(90deg,#1e1e38 25%,#2a2a50 50%,#1e1e38 75%);
    background-size:400% 100%;
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{
    0%{background-position:100% 0}
    100%{background-position:-100% 0}
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap{
    position:fixed;top:0;left:0;right:0;height:3px;z-index:300;
    background:rgba(255,255,255,0.05);
  }
  #progress-bar{
    height:100%;width:0%;
    background:linear-gradient(90deg,#7c3aed,#a78bfa);
    transition:width .25s ease;
    box-shadow:0 0 8px #7c3aed;
  }
  #progress-label{
    position:fixed;top:8px;left:50%;transform:translateX(-50%);
    color:rgba(167,139,250,0.9);
    font-size:.72rem;
    letter-spacing:.05em;
    z-index:300;
    opacity:0;
    transition:opacity .3s;
  }
  #progress-label.show{opacity:1}

  /* ── CANVAS AREA ── */
  #canvas-area{
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:auto;
    position:relative;
  }
  #page-canvas{
    max-width:100vw;max-height:100vh;
    object-fit:contain;
    display:none;
    opacity:0;
    transition:opacity .35s ease;
    border-radius:2px;
    box-shadow:0 8px 60px rgba(0,0,0,0.7);
  }
  #page-canvas.visible{opacity:1}

  /* Page transition overlay */
  #page-overlay{
    position:fixed;inset:0;
    background:#080810;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:50;
  }
  #page-overlay.flash{opacity:0.6}

  .msg{
    color:#aaa;font-size:1rem;
    text-align:center;padding:2rem;
    line-height:2;
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    display:none;
  }

  /* ── TOP BAR ── */
  #top-bar{
    position:fixed;top:0;left:0;right:0;
    background:linear-gradient(rgba(8,8,16,0.9),transparent);
    padding:14px 20px 30px;
    display:flex;justify-content:space-between;align-items:center;
    opacity:0;transition:opacity .3s;z-index:100;
  }
  #top-bar.show{opacity:1}
  #book-title-top{
    color:rgba(240,234,255,0.8);
    font-size:.82rem;
    max-width:55vw;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  /* ── BOTTOM UI ── */
  #ui{
    position:fixed;bottom:0;left:0;right:0;
    background:linear-gradient(transparent,rgba(8,8,16,0.92));
    padding:28px 30px 18px;
    display:flex;justify-content:center;align-items:center;
    gap:1.2rem;
    opacity:0;transition:opacity .3s;z-index:100;
  }
  #ui.show{opacity:1}

  .btn{
    background:var(--purple-dim);
    border:1px solid rgba(167,139,250,0.3);
    color:#fff;padding:9px 20px;
    border-radius:22px;cursor:pointer;
    font-size:.88rem;
    backdrop-filter:blur(8px);
    transition:background .2s,transform .15s,box-shadow .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:hover:not(:disabled){
    background:var(--purple);
    box-shadow:0 0 18px rgba(124,58,237,0.5);
    transform:translateY(-1px);
  }
  .btn:active{transform:scale(0.95)}
  .btn:disabled{background:rgba(60,60,80,0.6);border-color:transparent;cursor:not-allowed;opacity:0.5}

  #page-info{
    color:var(--text);font-size:.88rem;
    min-width:70px;text-align:center;
    font-variant-numeric:tabular-nums;
  }

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:rgba(124,58,237,0.9);
    color:#fff;padding:8px 20px;
    border-radius:20px;font-size:.8rem;
    opacity:0;transition:opacity .3s;
    z-index:500;pointer-events:none;
    white-space:nowrap;
  }
  #toast.show{opacity:1}
</style>
</head>
<body>

<!-- Progress bar -->
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="progress-label"></div>

<!-- Skeleton loader -->
<div id="skeleton">
  <div class="sk-title"></div>
  <div class="sk-page"></div>
  <div class="sk-nav">
    <div class="sk-btn"></div>
    <div class="sk-pg"></div>
    <div class="sk-btn"></div>
  </div>
</div>

<div id="top-bar">
  <button class="btn" onclick="location.href='index.html'">← Wapas</button>
  <span id="book-title-top"></span>
</div>

<div id="canvas-area">
  <div id="msg" class="msg"></div>
  <canvas id="page-canvas"></canvas>
</div>

<div id="page-overlay"></div>

<div id="ui">
  <button class="btn" id="prev-btn" onclick="changePage(-1)" disabled>◀</button>
  <span id="page-info">- / -</span>
  <button class="btn" id="next-btn" onclick="changePage(1)" disabled>▶</button>
  <button class="btn" onclick="zoomOut()">−</button>
  <button class="btn" onclick="zoomIn()">+</button>
</div>

<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, cur = 1, scale = 1.5, rendering = false, hideTimer = null;
const pageCache = {}; // rendered pages cache

// ── UI helpers ──
function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  const lbl = document.getElementById('progress-label');
  if (label) {
    lbl.textContent = label;
    lbl.classList.add('show');
  } else {
    lbl.classList.remove('show');
  }
}

function showSkeleton(show) {
  document.getElementById('skeleton').style.display = show ? 'flex' : 'none';
}

function showMsg(txt) {
  showSkeleton(false);
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.display = 'block';
  document.getElementById('page-canvas').style.display = 'none';
}

function showToast(msg, ms = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Mouse / Touch → show UI ──
function showUI() {
  document.getElementById('ui').classList.add('show');
  document.getElementById('top-bar').classList.add('show');
  document.body.style.cursor = 'default';
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    document.getElementById('ui').classList.remove('show');
    document.getElementById('top-bar').classList.remove('show');
    document.body.style.cursor = 'none';
  }, 2500);
}
document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

// ── Main init ──
async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showMsg('⚠️ ID nahi mili'); return; }

  setProgress(10, 'Kitab ki maloomat load ho rahi hai...');

  try {
    // 1. Fetch books.json
    const books = await (await fetch('books.json?t=' + Date.now())).json();
    const book = books.find(b => String(b.id) === String(id));

    if (!book)             { showMsg('❌ Kitab nahi mili'); return; }
    if (book.allow_access === false) { showMsg('🔒 Dastiyab nahi'); return; }
    if (!book.pdf_url)     { showMsg('⚠️ PDF upload nahi ki gayi'); return; }

    document.title = (book.title || 'Kitab') + ' — KitabGhar';
    document.getElementById('book-title-top').textContent = book.title || '';

    setProgress(25, 'PDF download ho rahi hai...');

    // 2. Keyboard shortcuts
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') e.preventDefault();
      if (e.ctrlKey && ['s','S','p','P'].includes(e.key)) e.preventDefault();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  changePage(-1);
    });

    // 3. Click left/right to change page
    document.getElementById('canvas-area').addEventListener('click', e => {
      if (e.target.closest('button')) return;
      if (e.clientX > window.innerWidth / 2) changePage(1);
      else changePage(-1);
    });

    // 4. Load PDF with progress tracking
    const loadingTask = pdfjsLib.getDocument({
      url: book.pdf_url,
      withCredentials: false,
      // Caching via rangeChunkSize for large PDFs
      rangeChunkSize: 65536,
    });

    loadingTask.onProgress = (prog) => {
      if (prog.total) {
        const pct = Math.round((prog.loaded / prog.total) * 65) + 25;
        const mb = (prog.loaded / 1048576).toFixed(1);
        setProgress(Math.min(pct, 90), `${mb} MB load hua...`);
      }
    };

    pdfDoc = await loadingTask.promise;

    setProgress(95, 'Pehla page tayyar ho raha hai...');

    // 5. Render first page
    await renderPage(1);

    setProgress(100);
    setTimeout(() => {
      document.getElementById('progress-wrap').style.opacity = '0';
      document.getElementById('progress-label').classList.remove('show');
    }, 600);

    // 6. Fullscreen
    document.documentElement.requestFullscreen().catch(() => {});

    // 7. Preload next pages in background
    setTimeout(() => preloadPages(2, 3), 800);

  } catch (e) {
    showMsg('❌ ' + e.message);
  }
}

// ── Preload pages silently into cache ──
async function preloadPages(...nums) {
  for (const n of nums) {
    if (n >= 1 && pdfDoc && n <= pdfDoc.numPages && !pageCache[n]) {
      try {
        const page = await pdfDoc.getPage(n);
        pageCache[n] = page; // store page object
      } catch(_) {}
    }
  }
}

// ── Render a page ──
async function renderPage(num) {
  if (rendering || !pdfDoc) return;
  rendering = true;

  cur = num;
  document.getElementById('page-info').textContent = num + ' / ' + pdfDoc.numPages;
  document.getElementById('prev-btn').disabled = num <= 1;
  document.getElementById('next-btn').disabled = num >= pdfDoc.numPages;

  // Flash overlay for smooth page transition
  const overlay = document.getElementById('page-overlay');
  overlay.classList.add('flash');

  // Get page — from cache if available
  const page = pageCache[num] || await pdfDoc.getPage(num);
  pageCache[num] = page;

  const area = document.getElementById('canvas-area');
  const vp0  = page.getViewport({ scale: 1 });
  const sc   = Math.min(area.clientWidth / vp0.width, area.clientHeight / vp0.height) * scale;
  const viewport = page.getViewport({ scale: sc });

  const canvas = document.getElementById('page-canvas');
  const ctx    = canvas.getContext('2d');

  // Render onto offscreen canvas first → swap (no flicker)
  const offscreen = document.createElement('canvas');
  offscreen.width  = viewport.width;
  offscreen.height = viewport.height;

  await page.render({ canvasContext: offscreen.getContext('2d'), viewport }).promise;

  // Swap
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  ctx.drawImage(offscreen, 0, 0);

  // Show canvas
  canvas.style.display = 'block';
  showSkeleton(false);
  document.getElementById('msg').style.display = 'none';

  // Fade in
  setTimeout(() => {
    canvas.classList.add('visible');
    overlay.classList.remove('flash');
  }, 30);

  rendering = false;

  // Preload adjacent pages
  preloadPages(num + 1, num + 2, num - 1);
}

function changePage(dir) {
  const np = cur + dir;
  if (!pdfDoc || np < 1 || np > pdfDoc.numPages || rendering) return;

  // Remove visible class for transition
  document.getElementById('page-canvas').classList.remove('visible');
  setTimeout(() => renderPage(np), 50);
}

function zoomIn()  { scale = Math.min(scale + 0.25, 3);   if (pdfDoc) renderPage(cur); }
function zoomOut() { scale = Math.max(scale - 0.25, 0.5); if (pdfDoc) renderPage(cur); }

// Keep fullscreen
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(() => {});
});

// Swipe gestures (mobile)
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) changePage(diff > 0 ? 1 : -1);
});

init();
</script>
</body>
</html>
