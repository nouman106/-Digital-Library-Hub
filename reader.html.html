<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
body{display:flex;flex-direction:column;height:100vh;margin:0;font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee}
header{background:#1e1e2f;color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
#book-title{font-weight:600;font-size:1rem;flex:1;text-align:center}
button{background:#7c3aed;border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.9rem}
.pdf-container{flex:1;overflow:auto;padding:1rem;background:#525659}
.pdf-page{margin:0 auto 1rem;box-shadow:0 0 10px rgba(0,0,0,0.3);background:#fff;max-width:900px}
canvas{width:100%;height:auto;display:block}
.watermark{position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.7);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;z-index:999;pointer-events:none}
.msg{text-align:center;padding:3rem;color:#ccc;font-size:1.1rem}
</style>
</head>
<body>
<header>
  <button onclick="location.href='index.html'">← Wapas</button>
  <span id="book-title">KitabGhar Reader</span>
  <div style="display:flex;gap:6px">
    <button onclick="zoomIn()">🔍+</button>
    <button onclick="zoomOut()">🔍−</button>
  </div>
</header>
<div class="pdf-container" id="pdf-container">
  <div class="msg">📖 Kitab load ho rahi hai...</div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
let pdfDoc = null, scale = 1.2;
async function init() {
  let id = new URLSearchParams(location.search).get('id');
  if (!id) { show('⚠️ Kitab ID nahi mili'); return; }
  try {
    let res = await fetch('books.json?t=' + Date.now());
    if (!res.ok) throw new Error('books.json nahi mili');
    let books = await res.json();
    let book = books.find(b => String(b.id) === String(id));
    if (!book) { show('❌ Kitab nahi mili'); return; }
    document.title = (book.title || 'Kitab') + ' — KitabGhar';
    document.getElementById('book-title').innerText = book.title || 'Kitab';
    if (book.allow_access === false) { show('🔒 Yeh kitab abhi dastiyab nahi hai'); return; }
    if (!book.allow_download) {
      let wm = document.createElement('div');
      wm.className = 'watermark';
      wm.innerText = '📖 Sirf parhne ke liye';
      document.body.appendChild(wm);
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => { if (e.ctrlKey && ['s','S','p','P'].includes(e.key)) e.preventDefault(); });
    }
    if (!book.pdf_url) { show('⚠️ PDF link nahi hai'); return; }
    pdfDoc = await pdfjsLib.getDocument(book.pdf_url).promise;
    renderAllPages();
  } catch(e) {
    console.error(e);
    show('❌ ' + e.message);
  }
}
async function renderAllPages() {
  let container = document.getElementById('pdf-container');
  container.innerHTML = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    let page = await pdfDoc.getPage(i);
    let viewport = page.getViewport({ scale });
    let canvas = document.createElement('canvas');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    let div = document.createElement('div');
    div.className = 'pdf-page';
    div.appendChild(canvas);
    container.appendChild(div);
  }
}
function show(msg) { document.getElementById('pdf-container').innerHTML = `<div class="msg">${msg}</div>`; }
function zoomIn() { scale = Math.min(scale + 0.2, 3); if (pdfDoc) renderAllPages(); }
function zoomOut() { scale = Math.max(scale - 0.2, 0.6); if (pdfDoc) renderAllPages(); }
init();
</script>
</body>
</html>
