<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reader — KitabGhar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;background:#525659;overflow:hidden}
header{background:#1e1e2f;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-shrink:0}
#book-title{font-weight:600;font-size:.9rem;flex:1;text-align:center;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:#7c3aed;border:none;color:#fff;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.85rem}
.btn:disabled{background:#444;cursor:not-allowed;opacity:.5}
#canvas-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:#525659;padding:10px}
#page-canvas{box-shadow:0 0 20px rgba(0,0,0,0.5);display:none}
.controls{background:#1e1e2f;padding:8px 16px;display:flex;justify-content:center;align-items:center;gap:1rem;flex-shrink:0}
#page-info{color:#ccc;font-size:.85rem;min-width:70px;text-align:center}
.msg{color:#eee;font-size:1rem;text-align:center;padding:2rem;line-height:2}

/* Floating controls jab fullscreen ho */
#float-controls{
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(30,30,47,0.9);
  padding:10px 20px;
  border-radius:30px;
  gap:1rem;
  align-items:center;
  z-index:9999;
  backdrop-filter:blur(10px);
}
#float-controls.show{display:flex}
</style>
</head>
<body>

<header id="header">
  <button class="btn" onclick="location.href='index.html'">← Wapas</button>
  <span id="book-title">KitabGhar Reader</span>
  <div style="display:flex;gap:5px">
    <button class="btn" onclick="zoomOut()">🔍−</button>
    <button class="btn" onclick="zoomIn()">🔍+</button>
    <button class="btn" onclick="toggleFS()" id="fs-btn">⛶ Full</button>
  </div>
</header>

<div id="canvas-area">
  <div id="msg" class="msg">📖 Load ho rahi hai...</div>
  <canvas id="page-canvas"></canvas>
</div>

<div class="controls" id="controls">
  <button class="btn" id="prev-btn" onclick="changePage(-1)" disabled>◀ Pichla</button>
  <span id="page-info">- / -</span>
  <button class="btn" id="next-btn" onclick="changePage(1)" disabled>Agla ▶</button>
</div>

<!-- Fullscreen floating controls -->
<div id="float-controls">
  <button class="btn" id="f-prev" onclick="changePage(-1)">◀</button>
  <span id="f-page-info" style="color:#ccc;font-size:.85rem;min-width:60px;text-align:center">- / -</span>
  <button class="btn" id="f-next" onclick="changePage(1)">▶</button>
  <button class="btn" onclick="zoomOut()">−</button>
  <button class="btn" onclick="zoomIn()">+</button>
  <button class="btn" onclick="toggleFS()">✕ Exit</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
let pdfDoc=null, cur=1, scale=1.5, rendering=false;

async function init(){
  let id=new URLSearchParams(location.search).get('id');
  if(!id){showMsg('⚠️ ID nahi mili');return;}
  try{
    let books=await(await fetch('books.json?t='+Date.now())).json();
    let book=books.find(b=>String(b.id)===String(id));
    if(!book){showMsg('❌ Kitab nahi mili');return;}
    if(book.allow_access===false){showMsg('🔒 Dastiyab nahi');return;}
    if(!book.pdf_url){showMsg('⚠️ PDF upload nahi ki gayi');return;}
    document.title=(book.title||'Kitab')+' — KitabGhar';
    document.getElementById('book-title').innerText=book.title||'Kitab';
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{
      if(e.ctrlKey&&['s','S','p','P'].includes(e.key))e.preventDefault();
      if(e.key==='ArrowRight'||e.key==='ArrowDown')changePage(1);
      if(e.key==='ArrowLeft'||e.key==='ArrowUp')changePage(-1);
    });
    showMsg('📖 PDF load ho rahi hai...');
    pdfDoc=await pdfjsLib.getDocument({url:book.pdf_url,withCredentials:false}).promise;
    document.getElementById('msg').style.display='none';
    document.getElementById('page-canvas').style.display='block';
    renderPage(1);
  }catch(e){showMsg('❌ '+e.message);}
}

async function renderPage(num){
  if(rendering||!pdfDoc)return;
  rendering=true;
  cur=num;
  document.getElementById('page-info').innerText=num+' / '+pdfDoc.numPages;
  document.getElementById('f-page-info').innerText=num+' / '+pdfDoc.numPages;
  document.getElementById('prev-btn').disabled=num<=1;
  document.getElementById('next-btn').disabled=num>=pdfDoc.numPages;
  document.getElementById('f-prev').disabled=num<=1;
  document.getElementById('f-next').disabled=num>=pdfDoc.numPages;
  let page=await pdfDoc.getPage(num);
  let viewport=page.getViewport({scale});
  let canvas=document.getElementById('page-canvas');
  canvas.width=viewport.width;
  canvas.height=viewport.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;
  rendering=false;
  document.getElementById('canvas-area').scrollTop=0;
}

function changePage(dir){
  let np=cur+dir;
  if(!pdfDoc||np<1||np>pdfDoc.numPages)return;
  renderPage(np);
}

function zoomIn(){scale=Math.min(scale+0.3,5);if(pdfDoc)renderPage(cur);}
function zoomOut(){scale=Math.max(scale-0.3,0.3);if(pdfDoc)renderPage(cur);}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange',()=>{
  let fs=!!document.fullscreenElement;
  document.getElementById('header').style.display=fs?'none':'flex';
  document.getElementById('controls').style.display=fs?'none':'flex';
  document.getElementById('float-controls').classList.toggle('show',fs);
});

init();
</script>
</body>
</html>
